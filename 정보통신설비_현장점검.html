<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0">
<title>정보통신설비 현장점검</title>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
<style>
  :root{
    --bg:#F5F6F8;
    --surface:#FFFFFF;
    --ink:#10172A;
    --muted:#64708A;
    --muted-weak:#9AA3B5;
    --accent:#155EEF;
    --accent-weak:#E8F0FF;
    --good:#1A8754;
    --good-weak:#E7F6EE;
    --bad:#D7263D;
    --bad-weak:#FDEAEC;
    --na:#B07A14;
    --na-weak:#FBF1DD;
    --border:#E3E6EC;
    --header:#10172A;
    --signal-on:#36D399;
    --signal-off:rgba(255,255,255,0.22);
    --radius:12px;
    --mono: ui-monospace, "SF Mono", SFMono-Regular, Consolas, "Liberation Mono", monospace;
    --sans: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Malgun Gothic", "Segoe UI", Roboto, sans-serif;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);font-family:var(--sans);}
  body{padding-bottom: env(safe-area-inset-bottom);}
  button{font-family:inherit; cursor:pointer;}
  input,textarea{font-family:inherit;}
  #app{max-width:560px;margin:0 auto;min-height:100vh;background:var(--bg);position:relative;}

  /* ---- Header ---- */
  .topbar{position:sticky;top:0;z-index:20;background:var(--header);color:#fff;padding:14px 16px;padding-top:calc(14px + env(safe-area-inset-top));}
  .topbar-row{display:flex;align-items:center;justify-content:space-between;gap:10px;}
  .brand{font-size:15px;font-weight:700;letter-spacing:.2px;}
  .brand small{display:block;font-weight:400;color:rgba(255,255,255,.6);font-size:11.5px;margin-top:1px;}
  .back-btn{background:none;border:none;color:#fff;font-size:20px;padding:4px 8px 4px 0;line-height:1;}
  .site-line{font-size:13px;color:rgba(255,255,255,.85);margin-top:2px;}
  .site-line b{color:#fff;font-weight:600;}

  .signal{display:flex;align-items:flex-end;gap:2px;height:22px;}
  .signal i{display:block;width:4px;border-radius:1px;background:var(--signal-off);}
  .signal i:nth-child(1){height:6px;} .signal i:nth-child(2){height:10px;}
  .signal i:nth-child(3){height:14px;} .signal i:nth-child(4){height:18px;}
  .signal i:nth-child(5){height:22px;}
  .signal i.on{background:var(--signal-on);}
  .progress-wrap{display:flex;align-items:center;gap:8px;margin-top:8px;}
  .progress-text{font-size:12px;font-family:var(--mono);color:rgba(255,255,255,.85);}

  /* ---- Generic ---- */
  .container{padding:14px 14px 100px;}
  .info-banner{background:var(--accent-weak);color:var(--accent);border-radius:10px;padding:10px 12px;font-size:12.5px;line-height:1.5;margin-bottom:14px;}
  .warn-banner{background:var(--bad-weak);color:var(--bad);border-radius:10px;padding:10px 12px;font-size:12.5px;line-height:1.5;margin-bottom:14px;font-weight:600;}
  .primary-btn{background:var(--accent);color:#fff;border:none;border-radius:10px;padding:13px 16px;font-size:15px;font-weight:600;width:100%;}
  .primary-btn:disabled{background:#AEC3F2;}
  .outline-btn{background:#fff;color:var(--accent);border:1px solid var(--accent);border-radius:10px;padding:9px 14px;font-size:13px;font-weight:600;}
  .ghost-btn{background:none;border:none;color:var(--muted);font-size:13px;}
  .dashed-btn{width:100%;background:#fff;border:1.5px dashed var(--border);color:var(--muted);border-radius:10px;padding:11px;font-size:13.5px;font-weight:500;margin-top:10px;}
  .field-label{font-size:12.5px;color:var(--muted);font-weight:600;margin:14px 0 6px;}
  .field-label:first-child{margin-top:0;}
  .text-input{width:100%;border:1px solid var(--border);border-radius:10px;padding:11px 12px;font-size:15px;background:#fff;color:var(--ink);}
  .text-input:focus{outline:2px solid var(--accent);outline-offset:1px;}

  /* ---- List view ---- */
  .empty-state{text-align:center;padding:48px 20px;color:var(--muted);font-size:13.5px;}
  .insp-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:10px;position:relative;}
  .insp-card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;}
  .insp-name{font-size:16px;font-weight:700;}
  .insp-meta{font-size:12px;color:var(--muted);margin-top:3px;}
  .insp-bar-track{height:5px;background:var(--border);border-radius:3px;margin-top:12px;overflow:hidden;}
  .insp-bar-fill{height:100%;background:var(--accent);border-radius:3px;}
  .insp-bottom{display:flex;justify-content:space-between;align-items:center;margin-top:6px;}
  .insp-pct{font-size:11.5px;font-family:var(--mono);color:var(--muted);}
  .del-btn{background:none;border:none;color:var(--muted-weak);font-size:12px;padding:4px 6px;}
  .del-btn.confirm{color:var(--bad);font-weight:600;}
  .equip-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-top:6px;}
  .equip-item{display:flex;align-items:center;gap:7px;background:#fff;border:1.5px solid var(--border);border-radius:8px;padding:8px 10px;cursor:pointer;transition:border-color .12s,background .12s;}
  .equip-item.checked{border-color:var(--accent);background:var(--accent-weak);}
  .equip-item input[type=checkbox]{width:16px;height:16px;accent-color:var(--accent);flex-shrink:0;}
  .equip-item label{font-size:11.5px;font-weight:500;color:var(--ink);cursor:pointer;line-height:1.35;}
  .equip-item.checked label{color:var(--accent);font-weight:600;}
  .equip-select-all{display:flex;gap:8px;margin-bottom:8px;}
  .equip-select-all button{flex:1;background:#fff;border:1px solid var(--border);border-radius:7px;padding:7px;font-size:12px;font-weight:600;color:var(--muted);}
  .step-badge{display:inline-block;background:var(--accent);color:#fff;border-radius:20px;font-size:11px;font-weight:700;padding:2px 9px;margin-right:6px;}
  .step-count{font-size:11.5px;color:var(--muted);margin-top:4px;}
  .form-row-btns{display:flex;gap:8px;margin-top:16px;}
  .form-row-btns .primary-btn{flex:1;}

  /* ---- Category accordion ---- */
  .cat{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:10px;overflow:hidden;}
  .cat-head{display:flex;align-items:center;justify-content:space-between;padding:13px 14px;}
  .cat-head-left{display:flex;align-items:center;gap:9px;flex:1;min-width:0;}
  .cat-name{font-size:14.5px;font-weight:700;}
  .cat-badge{font-family:var(--mono);font-size:11.5px;font-weight:600;padding:2px 8px;border-radius:20px;background:var(--bg);color:var(--muted);white-space:nowrap;}
  .cat-badge.done{background:var(--good-weak);color:var(--good);}
  .cat-badge.partial{background:var(--accent-weak);color:var(--accent);}
  .cat-chev{color:var(--muted);font-size:20px;transition:transform .18s ease;line-height:1;}
  .bulk-good-btn{background:#fff;border:1.5px solid var(--border);color:var(--muted);border-radius:7px;padding:4px 9px;font-size:11.5px;font-weight:600;cursor:pointer;white-space:nowrap;transition:all .12s;}
  .bulk-good-btn.active{background:var(--good-weak);border-color:var(--good);color:var(--good);}
  /* 건물구조 */
  .struct-bld-card{border:1.5px solid var(--border);border-radius:12px;margin-bottom:10px;overflow:hidden;}
  .struct-bld-header{background:var(--ink);color:#fff;padding:10px 14px;display:flex;align-items:center;gap:8px;}
  .struct-bld-name{font-size:14px;font-weight:800;flex:1;}
  .struct-bld-meta{font-size:11.5px;opacity:.7;}
  .floor-map{overflow-x:auto;-webkit-overflow-scrolling:touch;}
  .floor-map table{border-collapse:collapse;min-width:100%;font-size:11.5px;}
  .floor-map th{background:#f0f2f6;padding:5px 8px;text-align:center;font-weight:700;font-size:11px;color:var(--muted);border:1px solid var(--border);white-space:nowrap;}
  .floor-map td{padding:4px 6px;border:1px solid var(--border);text-align:center;min-width:44px;}
  .floor-map .floor-label{font-weight:700;font-size:12px;color:var(--muted);background:#fafafa;}
  .room-cell{border-radius:5px;padding:3px 5px;font-size:10.5px;font-weight:700;cursor:pointer;display:inline-block;min-width:36px;text-align:center;}
  .rc-done{background:var(--good-weak);color:var(--good);}
  .rc-inprog{background:#fff8ee;color:var(--warn);}
  .rc-wait{background:#f0f2f6;color:var(--muted);}
  .rc-none{color:#ddd;font-size:10px;}
  .struct-legend{display:flex;gap:10px;flex-wrap:wrap;padding:8px 14px;background:#fafafa;border-top:1px solid var(--border);}
  .legend-item{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--muted);}
  .legend-dot{width:10px;height:10px;border-radius:3px;display:inline-block;}
  .cat-del-row{display:flex;align-items:center;gap:8px;padding:10px 14px;border-top:1px solid var(--border);}
  .cat-del-btn{background:none;border:1px solid var(--border);color:var(--muted);border-radius:7px;padding:6px 12px;font-size:12.5px;font-weight:600;cursor:pointer;}
  .cat-del-btn:active{background:var(--bad-weak);color:var(--bad);border-color:var(--bad);}
  .cat-del-confirm-btn{background:var(--bad);color:#fff;border:none;border-radius:7px;padding:6px 12px;font-size:12.5px;font-weight:700;cursor:pointer;}
  .cat-del-cancel-btn{background:none;border:1px solid var(--border);color:var(--muted);border-radius:7px;padding:6px 12px;font-size:12.5px;cursor:pointer;}
  .toggle-switch{position:relative;display:inline-block;width:44px;height:26px;flex-shrink:0;}
  .toggle-switch input{opacity:0;width:0;height:0;}
  .toggle-track{position:absolute;cursor:pointer;inset:0;background:#ccc;border-radius:26px;transition:.2s;}
  .toggle-track::before{content:"";position:absolute;height:20px;width:20px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:.2s;}
  .toggle-switch input:checked + .toggle-track{background:var(--accent);}
  .toggle-switch input:checked + .toggle-track::before{transform:translateX(18px);}
  .cat.open .cat-chev{transform:rotate(180deg);}
  .cat-body{display:none;border-top:1px solid var(--border);}
  .cat.open .cat-body{display:block;}

  /* ---- Item ---- */
  .item{padding:13px 14px;border-bottom:1px solid var(--border);}
  .loc-head{display:flex;align-items:center;justify-content:space-between;background:var(--accent-weak);padding:9px 14px;border-bottom:1px solid var(--border);gap:8px;}
  .loc-name{font-size:13px;font-weight:700;color:var(--accent);}
  .loc-actions{display:flex;gap:6px;flex-shrink:0;}
  .loc-actions button{background:none;border:none;font-size:11.5px;color:var(--accent);font-weight:600;padding:3px 4px;}
  .loc-actions button.loc-del-btn{color:var(--muted);}
  .loc-actions button.loc-del-btn.confirm{color:var(--bad);}
  .loc-head .loc-rename-input{flex:1;padding:7px 10px;font-size:13px;}
  .loc-head .loc-rename-go{background:var(--accent);color:#fff;border:none;border-radius:8px;padding:7px 12px;font-size:12.5px;font-weight:600;flex-shrink:0;}
  .item:last-of-type{border-bottom:none;}
  .item-name{font-size:14px;font-weight:600;}
  .item-std{font-size:12px;color:var(--muted);margin-top:2px;line-height:1.45;}
  .seg{display:flex;margin-top:10px;border-radius:9px;overflow:hidden;border:1px solid var(--border);}
  .seg button{flex:1;border:none;background:#fff;color:var(--muted);font-size:12.5px;font-weight:600;padding:9px 4px;border-right:1px solid var(--border);}
  .seg button:last-child{border-right:none;}
  .seg button.active.good{background:var(--good-weak);color:var(--good);}
  .seg button.active.bad{background:var(--bad-weak);color:var(--bad);}
  .seg button.active.na{background:var(--na-weak);color:var(--na);}
  .value-row{display:flex;align-items:center;gap:8px;margin-top:9px;}
  .value-input{flex:1;border:1px solid var(--border);border-radius:8px;padding:9px 10px;font-family:var(--mono);font-size:14px;color:var(--ink);background:#fff;}
  .value-unit{font-size:12.5px;color:var(--muted);min-width:fit-content;}
  .item-row-bottom{display:flex;align-items:center;gap:10px;margin-top:9px;flex-wrap:wrap;}
  .photo-strip{display:flex;gap:8px;flex-wrap:wrap;margin-top:9px;}
  .photo-thumb{width:54px;height:54px;border-radius:8px;object-fit:cover;border:1px solid var(--border);display:block;}
  .photo-thumb-wrap{position:relative;width:54px;height:54px;}
  .photo-del{position:absolute;top:-6px;right:-6px;width:18px;height:18px;border-radius:50%;background:var(--bad);color:#fff;border:2px solid #fff;font-size:11px;line-height:14px;text-align:center;padding:0;}
  .photo-add{width:54px;height:54px;border-radius:8px;border:1.5px dashed var(--border);background:#fff;color:var(--muted);font-size:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;}
  .photo-add span{font-size:15px;line-height:1;}
  .insp-type-sel{display:flex;gap:10px;margin-bottom:4px;}
  .insp-type-btn{flex:1;background:#f7f8fa;border:2px solid var(--border);border-radius:12px;padding:12px 10px;text-align:center;font-size:14px;font-weight:700;color:var(--muted);cursor:pointer;line-height:1.3;}
  .insp-type-btn span{display:block;font-size:11px;font-weight:400;margin-top:4px;color:var(--muted);}
  .insp-type-btn.active{border-color:var(--accent);background:var(--accent-weak);color:var(--accent);}
  .insp-type-btn.active span{color:var(--accent);}
  .insp-type-badge{font-size:10px;font-weight:700;padding:1px 7px;border-radius:10px;display:inline-block;}
  /* Firebase 실시간 연동 */
  .sync-badge{display:none;align-items:center;gap:5px;background:#1a8754;color:#fff;font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;cursor:pointer;}
  .sync-badge.offline{background:#888;}
  .sync-badge .sync-dot{width:7px;height:7px;border-radius:50%;background:#7dffc4;animation:blink 1.2s infinite;}
  @keyframes blink{0%,100%{opacity:1;}50%{opacity:.3;}}
  .fb-setup-btn{background:none;border:1.5px solid rgba(255,255,255,.35);color:#fff;font-size:11.5px;font-weight:600;border-radius:8px;padding:5px 9px;cursor:pointer;}
  .fb-code-box{background:#1a2540;color:#7dffc4;font-size:22px;font-weight:900;letter-spacing:6px;text-align:center;border-radius:12px;padding:14px 0;margin:10px 0;font-family:monospace;}
  .sync-member{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--border);}
  .sync-pulse{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--good);animation:blink 1.5s infinite;}
  .loc-tabbar::-webkit-scrollbar{display:none;}
  .loc-tab{flex-shrink:0;padding:9px 14px;font-size:13px;font-weight:600;color:var(--muted);border:none;background:none;border-bottom:2.5px solid transparent;margin-bottom:-2px;cursor:pointer;white-space:nowrap;}
  .loc-tab.active{color:var(--accent);border-bottom-color:var(--accent);}
  .loc-tab-add{flex-shrink:0;padding:9px 12px;font-size:18px;color:var(--muted-weak);border:none;background:none;cursor:pointer;line-height:1;}
  .loc-name-edit{display:flex;align-items:center;gap:6px;padding:8px 14px;background:var(--accent-weak);}
  .loc-name-edit input{flex:1;border:1px solid var(--accent);border-radius:7px;padding:7px 10px;font-size:13.5px;font-weight:600;}
  .loc-name-edit button{background:var(--accent);color:#fff;border:none;border-radius:7px;padding:7px 12px;font-size:13px;font-weight:700;}
  .note-toggle{font-size:12px;color:var(--accent);background:none;border:none;padding:0;font-weight:600;}
  .note-area{width:100%;border:1px solid var(--border);border-radius:8px;padding:8px 10px;font-size:13px;margin-top:8px;resize:vertical;min-height:54px;color:var(--ink);}

  .add-item-form, .add-cat-form{background:var(--bg);border-top:1px solid var(--border);padding:13px 14px;}
  .add-item-form .text-input, .add-cat-form .text-input{margin-bottom:8px;}
  .checkbox-row{display:flex;align-items:center;gap:7px;font-size:13px;color:var(--muted);margin-bottom:8px;}
  .checkbox-row input{width:16px;height:16px;}
  .mini-form-btns{display:flex;gap:8px;}
  .mini-form-btns button{flex:1;padding:9px;border-radius:8px;font-size:13px;font-weight:600;border:1px solid var(--border);background:#fff;color:var(--muted);}
  .mini-form-btns button.go{background:var(--accent);color:#fff;border-color:var(--accent);}

  /* ---- Bottom bar ---- */
  .bottombar{position:fixed;left:0;right:0;bottom:0;max-width:560px;margin:0 auto;background:#fff;border-top:1px solid var(--border);padding:10px 14px;padding-bottom:calc(10px + env(safe-area-inset-bottom));display:flex;align-items:center;justify-content:space-between;gap:10px;z-index:20;}
  .save-status{font-size:11.5px;color:var(--muted-weak);display:flex;align-items:center;gap:5px;}
  .save-dot{width:6px;height:6px;border-radius:50%;background:var(--good);}
  .save-dot.pending{background:var(--na);}

  /* ---- Mode tabs ---- */
  .mode-tabs{display:flex;background:#fff;border-bottom:2px solid var(--border);position:sticky;top:0;z-index:19;}
  .mode-tab{flex:1;padding:11px 6px;text-align:center;font-size:13px;font-weight:600;color:var(--muted);border:none;background:none;border-bottom:2px solid transparent;margin-bottom:-2px;cursor:pointer;}
  .mode-tab.active{color:var(--accent);border-bottom-color:var(--accent);}
  .mode-tab .tab-count{display:inline-block;background:var(--accent-weak);color:var(--accent);border-radius:10px;font-size:10px;padding:1px 6px;margin-left:4px;font-weight:700;}
  .mode-tab.active .tab-count{background:var(--accent);color:#fff;}
  /* ---- Photo mode item cards ---- */
  .pm-cat{margin-bottom:12px;}
  .pm-cat-head{font-size:13px;font-weight:700;color:var(--muted);padding:8px 0 4px;border-bottom:1px solid var(--border);margin-bottom:8px;display:flex;align-items:center;gap:6px;}
  .pm-item{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 13px;margin-bottom:8px;}
  .pm-item-name{font-size:13.5px;font-weight:600;margin-bottom:4px;}
  .pm-item-result{display:inline-block;font-size:11px;font-weight:700;padding:2px 8px;border-radius:10px;margin-bottom:8px;}
  .pm-item-result.ok{background:var(--good-weak);color:var(--good);}
  .pm-item-result.bad{background:var(--bad-weak);color:var(--bad);}
  .pm-item-result.na{background:var(--na-weak);color:var(--na);}
  .pm-item-result.none{background:#f0f0f0;color:var(--muted);}
  .pm-empty{text-align:center;padding:36px 20px;color:var(--muted);font-size:13px;line-height:1.6;}
  .overlay{position:fixed;inset:0;background:rgba(10,14,26,.78);z-index:50;display:flex;align-items:flex-end;justify-content:center;}
  .overlay.center{align-items:center;padding:20px;}
  .sheet{background:#fff;border-radius:16px 16px 0 0;width:100%;max-width:560px;max-height:85vh;overflow-y:auto;padding:18px 16px calc(18px + env(safe-area-inset-bottom));}
  .overlay.center .sheet{border-radius:14px;max-height:90vh;}
  .sheet-title{font-size:15.5px;font-weight:700;margin-bottom:10px;}
  .sheet textarea.summary{width:100%;min-height:300px;border:1px solid var(--border);border-radius:10px;padding:10px;font-size:12.5px;font-family:var(--mono);line-height:1.55;color:var(--ink);}
  .sheet-btn-row{display:flex;gap:8px;margin-top:12px;}
  .sheet-btn-row button{flex:1;}
  .photo-view{max-width:100%;max-height:100%;border-radius:8px;}
  .photo-view-overlay{padding:16px;}
  .copy-toast{position:fixed;left:50%;bottom:90px;transform:translateX(-50%);background:var(--ink);color:#fff;font-size:13px;padding:9px 16px;border-radius:20px;z-index:60;}
</style>
</head>
<body>
<div id="app"></div>

<input type="file" id="photoFileInput" accept="image/*" capture="environment" style="display:none">

<script>
(function(){
  "use strict";

  /* ============ 기본 설비 카테고리 & 점검항목 ============
     점검항목은 제출하신 설비별 성능점검표 이미지에서 그대로 옮겼습니다.
     이미지가 없는 카테고리는 빈 상태이며 "+ 점검 항목 추가"로 직접 추가하세요. */
  function tpl(){
    const V = true, X = false;

  /* ============================================================
     🔥 Firebase 실시간 연동 모듈
     - Firebase Realtime Database 기반 실시간 다중 사용자 동기화
     - Firebase 미설정 시 기존 로컬 모드로 동작 (하위 호환)
  ============================================================ */
  const MY_DEVICE_ID = 'dev_' + Math.random().toString(36).slice(2, 10);
  let fbApp = null, fbDB = null, fbSyncRef = null;
  let fbSyncActive = false, fbSyncTimer = null, fbIgnoreMs = 0;
  let fbOnlineCount = 1; // 현재 연동 중인 인원 수

  /* Firebase 설정 로드/저장 */
  function getFbConfig(){ try{ return JSON.parse(localStorage.getItem('fb_cfg')||'null'); }catch{ return null; } }
  function setFbConfig(c){ localStorage.setItem('fb_cfg', JSON.stringify(c)); }

  /* Firebase 초기화 */
  function initFirebase(cfg){
    try{
      // 기존 앱이 있으면 삭제
      if(fbApp){ try{ fbApp.delete(); }catch{} fbApp=null; fbDB=null; }
      const appName = 'ktinsp_' + Date.now();
      fbApp = firebase.initializeApp(cfg, appName);
      fbDB  = firebase.database(fbApp);
      setFbConfig(cfg);
      return true;
    }catch(e){
      console.error('Firebase 초기화 실패:', e);
      return false;
    }
  }

  /* 실시간 동기화 시작 */
  function startFirebaseSync(insp){
    if(!fbDB || !insp){ showToast("Firebase 설정 먼저 해주세요 (상단 🔥 버튼)"); return; }
    stopFirebaseSync();
    fbSyncActive = true;

    // 공유코드 = ID 앞 6자 대문자
    if(!insp.shareCode) insp.shareCode = insp.id.slice(0,6).toUpperCase();

    const path = 'inspections/' + insp.id;
    fbSyncRef = fbDB.ref(path);

    // 온라인 프레즌스 등록
    const presenceRef = fbDB.ref(path + '/presence/' + MY_DEVICE_ID);
    presenceRef.set({ name: insp.inspector||'점검자', joinedAt: Date.now() });
    presenceRef.onDisconnect().remove();

    // 온라인 인원 감지
    fbDB.ref(path + '/presence').on('value', snap=>{
      fbOnlineCount = snap.numChildren ? snap.numChildren() : 1;
      updateSyncBadge();
    });

    // 원격 변경 수신
    fbSyncRef.child('data').on('value', snap=>{
      const remote = snap.val();
      if(!remote) return;
      if(remote._deviceId === MY_DEVICE_ID) return;
      if(Date.now() < fbIgnoreMs) return;
      mergeFromRemote(remote);
    });

    // 현재 데이터 즉시 업로드
    pushToFirebase(true);
    updateSyncBadge();
    showToast(`🔥 실시간 연동 시작 — 공유코드: ${insp.shareCode}`);
  }

  /* 실시간 동기화 중지 */
  function stopFirebaseSync(){
    if(fbSyncRef){ fbSyncRef.off(); fbSyncRef=null; }
    if(current && fbDB){
      try{ fbDB.ref('inspections/'+current.id+'/presence/'+MY_DEVICE_ID).remove(); }catch{}
    }
    fbSyncActive = false;
    updateSyncBadge();
  }

  /* Firebase에 데이터 푸시 (디바운스 800ms) */
  function pushToFirebase(immediate=false){
    if(!fbDB || !fbSyncRef || !current || !fbSyncActive) return;
    if(fbSyncTimer) clearTimeout(fbSyncTimer);
    const delay = immediate ? 0 : 800;
    fbSyncTimer = setTimeout(()=>{
      try{
        // 사진 key 목록만 포함 (base64 제외 — Firebase용량 절약)
        const payload = JSON.parse(JSON.stringify(current));
        payload.categories.forEach(cat=>
          cat.locations.forEach(loc=>{ loc.photos = (loc.photos||[]); })
        );
        payload._deviceId  = MY_DEVICE_ID;
        payload._pushedAt  = Date.now();
        fbIgnoreMs = Date.now() + 3000; // 3초간 원격수신 무시
        fbSyncRef.child('data').set(payload).catch(e=> console.error('Firebase push error:', e));
        fbIgnoreMs = 0;
      }catch(e){ console.error('Firebase push error:', e); }
    }, delay);
  }

  /* 원격 데이터 병합 */
  function mergeFromRemote(remote){
    if(!current || !remote) return;
    let changed = false;

    (remote.categories||[]).forEach(rCat=>{
      const myCat = current.categories.find(c=>c.id===rCat.id);
      if(!myCat) return;
      (rCat.locations||[]).forEach(rLoc=>{
        const myLoc = myCat.locations.find(l=>l.id===rLoc.id);
        if(!myLoc) return;
        // 위치명 병합
        if(!myLoc.name && rLoc.name){ myLoc.name = rLoc.name; changed=true; }
        // 메모 병합
        if(!myLoc.memo && rLoc.memo){ myLoc.memo = rLoc.memo; changed=true; }
        // 항목 결과 병합 (빈 항목에만 적용)
        (rLoc.items||[]).forEach(rIt=>{
          const myIt = myLoc.items.find(i=>i.id===rIt.id);
          if(!myIt) return;
          if(!myIt.result && rIt.result){ myIt.result=rIt.result; changed=true; }
          if(!myIt.value  && rIt.value ){ myIt.value =rIt.value;  changed=true; }
          if(!myIt.note   && rIt.note  ){ myIt.note  =rIt.note;   changed=true; }
        });
        // 사진 키 병합
        (rLoc.photos||[]).forEach(key=>{
          if(!(myLoc.photos||[]).includes(key)){ (myLoc.photos=myLoc.photos||[]).push(key); changed=true; }
        });
      });
    });

    if(changed){
      scheduleSave();
      renderDetail();
      showToast(`👥 동료 업데이트 반영됨`);
    }
  }

  /* 공유코드로 점검 참여 */
  async function joinByFirebaseCode(code){
    if(!fbDB) return false;
    try{
      const snap = await fbDB.ref('inspections')
        .orderByChild('data/shareCode').equalTo(code.toUpperCase()).once('value');
      if(!snap.exists()) return false;

      let found = null;
      snap.forEach(child=>{ found = child.val()?.data; });
      if(!found) return false;

      const insp = migrateInspection(found);
      await sSet('inspection:'+insp.id, JSON.stringify(insp));
      updateIndexEntry(insp); await saveIndex();
      return insp.id;
    }catch(e){ console.error('Firebase join error:', e); return false; }
  }

  /* 동기화 배지 업데이트 */
  function updateSyncBadge(){
    const badge = document.getElementById('fb-sync-badge');
    if(!badge) return;
    if(fbSyncActive){
      badge.style.display = 'inline-flex';
      badge.innerHTML = `<span class="sync-dot"></span>실시간 ${fbOnlineCount}명`;
      badge.title = `공유코드: ${current?.shareCode||''}`;
    } else if(fbDB) {
      badge.style.display = 'inline-flex';
      badge.classList.add('offline');
      badge.innerHTML = `🔥 연동대기`;
    } else {
      badge.style.display = 'none';
    }
  }

    const isConnected = !!fbDB;
    const ov = document.createElement('div');
    ov.className = 'overlay center';
    ov.innerHTML = `
      <div class="sheet">
        <div class="sheet-title">🔥 Firebase 실시간 연동</div>
        ${isConnected ? `
          <div style="background:#edfaf4;border-radius:10px;padding:12px;margin-bottom:12px;text-align:center;">
            <div style="font-size:13px;font-weight:700;color:#1a8754;">✅ Firebase 연결됨</div>
            <div style="font-size:11.5px;color:#555;margin-top:4px;">프로젝트: ${cfg?.projectId||''}</div>
          </div>` : `
          <div style="background:#fff8ee;border-radius:10px;padding:12px;margin-bottom:12px;">
            <div style="font-size:12.5px;font-weight:700;color:#7a4500;margin-bottom:6px;">설정 방법 (1회만)</div>
            <div style="font-size:11.5px;color:#555;line-height:1.8;">
              1. <a href="https://console.firebase.google.com" target="_blank" style="color:var(--accent);">Firebase 콘솔</a> → 프로젝트 만들기<br>
              2. 빌드 → Realtime Database → 데이터베이스 만들기<br>
              3. 규칙 탭 → <code style="background:#f0f0f0;padding:1px 4px;border-radius:3px;">read/write: true</code> 로 변경 후 게시<br>
              4. 프로젝트 설정 → 웹 앱 추가 → 아래 JSON 붙여넣기
            </div>
          </div>`}
        <div class="field-label">Firebase 설정 JSON</div>
        <textarea id="fb-cfg-input" class="note-area" style="height:130px;font-size:10.5px;font-family:monospace;" placeholder='{"apiKey":"AIza...","authDomain":"xxx.firebaseapp.com","databaseURL":"https://xxx-default-rtdb.firebaseio.com","projectId":"xxx","storageBucket":"xxx.appspot.com","messagingSenderId":"...","appId":"..."}'>${cfg ? JSON.stringify(cfg, null, 2) : ''}</textarea>
        <div class="sheet-btn-row" style="margin-top:12px;gap:8px;">
          <button class="outline-btn" id="fb-cancel-btn" style="flex:1;">취소</button>
          <button class="primary-btn" id="fb-save-btn" style="flex:2;">💾 저장 및 연결</button>
        </div>
        ${isConnected ? `
        <div style="border-top:1px solid var(--border);margin-top:12px;padding-top:12px;">
          <button class="ghost-btn" id="fb-disconnect-btn" style="width:100%;color:var(--bad);">연결 해제</button>
        </div>` : ''}
      </div>
    `;
    document.body.appendChild(ov);
    ov.addEventListener('click', e=>{ if(e.target===ov) ov.remove(); });
    document.getElementById('fb-cancel-btn').onclick = ()=> ov.remove();
    document.getElementById('fb-save-btn').onclick = ()=>{
      try{
        const raw = document.getElementById('fb-cfg-input').value.trim();
        const cfg = JSON.parse(raw);
        if(!cfg.databaseURL){ alert('databaseURL이 없습니다.\nFirebase Realtime Database URL을 포함해주세요.'); return; }
        if(initFirebase(cfg)){
          showToast('🔥 Firebase 연결 성공!');
          ov.remove();
          updateSyncBadge();
        } else {
          alert('Firebase 연결 실패.\n설정값을 다시 확인해주세요.');
        }
      }catch(e){ alert('JSON 형식 오류: ' + e.message); }
    };
    if(document.getElementById('fb-disconnect-btn')){
      document.getElementById('fb-disconnect-btn').onclick = ()=>{
        stopFirebaseSync();
        localStorage.removeItem('fb_cfg');
        fbApp=null; fbDB=null;
        showToast('Firebase 연결이 해제됐습니다.');
        ov.remove();
        updateSyncBadge();
      };
    }
  }

  /* ============ Storage helpers ============
     이 앱은 두 가지 환경에서 모두 동작합니다:
     1) Claude 안에서 미리보기로 열었을 때 -> window.storage 사용
     2) 다운로드 후 휴대폰에서 단독 파일로 열었을 때 -> 브라우저 내장 IndexedDB 사용 (완전 오프라인 동작)
     둘 다 사용 불가하면 메모리에만 저장(앱은 정상 동작하되, 완전히 닫으면 데이터는 사라짐). */
  let backend = "mem";
  const memStore = new Map();
  let idbPromise = null;

  function getIDB(){
    if(idbPromise) return idbPromise;
    idbPromise = new Promise((resolve, reject)=>{
      if(!window.indexedDB){ reject(new Error("no indexedDB")); return; }
      const req = indexedDB.open("telecom-inspect-db", 1);
      req.onupgradeneeded = ()=> req.result.createObjectStore("kv");
      req.onsuccess = ()=> resolve(req.result);
      req.onerror = ()=> reject(req.error);
    });
    return idbPromise;
  }

  let storageWarning = false;
  async function detectBackend(){
    if(window.storage && typeof window.storage.set === "function"){
      backend = "native";
      return;
    }
    try{ await getIDB(); backend = "idb"; }
    catch(e){ backend = "mem"; storageWarning = true; }
  }

  async function sGet(key){
    try{
      if(backend === "native"){
        const r = await window.storage.get(key, false);
        return r ? r.value : null;
      }
      if(backend === "idb"){
        const db = await getIDB();
        return await new Promise((resolve,reject)=>{
          const tx = db.transaction("kv","readonly");
          const req = tx.objectStore("kv").get(key);
          req.onsuccess = ()=> resolve(req.result !== undefined ? req.result : null);
          req.onerror = ()=> reject(req.error);
        });
      }
      return memStore.has(key) ? memStore.get(key) : null;
    }catch(e){ return null; }
  }

  async function sSet(key, value){
    try{
      if(backend === "native"){ return await window.storage.set(key, value, false); }
      if(backend === "idb"){
        const db = await getIDB();
        return await new Promise((resolve,reject)=>{
          const tx = db.transaction("kv","readwrite");
          tx.objectStore("kv").put(value, key);
          tx.oncomplete = ()=> resolve(true);
          tx.onerror = ()=> reject(tx.error);
        });
      }
      memStore.set(key, value);
      return true;
    }catch(e){ console.error("storage set failed", e); return null; }
  }

  async function sDelete(key){
    try{
      if(backend === "native"){ return await window.storage.delete(key, false); }
      if(backend === "idb"){
        const db = await getIDB();
        return await new Promise((resolve,reject)=>{
          const tx = db.transaction("kv","readwrite");
          tx.objectStore("kv").delete(key);
          tx.oncomplete = ()=> resolve(true);
          tx.onerror = ()=> reject(tx.error);
        });
      }
      memStore.delete(key);
      return true;
    }catch(e){ return null; }
  }

  async function sList(prefix){
    try{
      if(backend === "native"){
        const r = await window.storage.list(prefix, false);
        return r ? r.keys : [];
      }
      if(backend === "idb"){
        const db = await getIDB();
        return await new Promise((resolve,reject)=>{
          const tx = db.transaction("kv","readonly");
          const store = tx.objectStore("kv");
          const range = prefix ? IDBKeyRange.bound(prefix, prefix + "\uffff") : undefined;
          const keys = [];
          const req = store.openKeyCursor(range);
          req.onsuccess = (e)=>{
            const cur = e.target.result;
            if(cur){ keys.push(cur.key); cur.continue(); }
            else resolve(keys);
          };
          req.onerror = ()=> reject(req.error);
        });
      }
      const keys = [];
      memStore.forEach((v,k)=>{ if(!prefix || k.indexOf(prefix)===0) keys.push(k); });
      return keys;
    }catch(e){ return []; }
  }

  function computeProgress(insp){
    let done = 0, total = 0;
    insp.categories.forEach(cat=>{
      cat.locations.forEach(loc=>{
        loc.items.forEach(it=>{
          total++;
          if(it.result) done++;
        });
      });
    });
    return {done, total, pct: total ? Math.round(done/total*100) : 0};
  }

  function categoryProgress(cat){
    let done=0, total=0;
    cat.locations.forEach(loc=>{
      loc.items.forEach(it=>{ total++; if(it.result) done++; });
    });

  }

  // 동료 사진 병합 (내게 없는 사진 키 추가)
  function mergePhotos(mine, theirs){
    theirs.categories.forEach(theirCat=>{
      const myCat = mine.categories.find(c=>c.id===theirCat.id);
      if(!myCat) return;
      theirCat.locations.forEach(theirLoc=>{
        const myLoc = myCat.locations.find(l=>l.id===theirLoc.id);
        if(!myLoc) return;
        // 위치 사진 병합
        (theirLoc.photos||[]).forEach(key=>{
          if(!(myLoc.photos||[]).includes(key)){
            if(!myLoc.photos) myLoc.photos = [];
            myLoc.photos.push(key);
          }
        });
      });
    });
  }

  // 동료 데이터 병합: 내 빈 항목에 동료 값 채우기
  function mergeInspectionData(mine, theirs){
    theirs.categories.forEach(theirCat=>{
      const myCat = mine.categories.find(c=>c.id===theirCat.id);
      if(!myCat) return;
      theirCat.locations.forEach(theirLoc=>{
        const myLoc = myCat.locations.find(l=>l.id===theirLoc.id);
        if(!myLoc) return;
        theirLoc.items.forEach(theirIt=>{
          const myIt = myLoc.items.find(i=>i.id===theirIt.id);
          if(!myIt) return;
          if(!myIt.result && theirIt.result) myIt.result = theirIt.result;
          if(!myIt.value  && theirIt.value)  myIt.value  = theirIt.value;
          if(!myIt.note   && theirIt.note)   myIt.note   = theirIt.note;
        });
      });
    });
  }

      html.push('<div class="warn-banner">⚠ 이 브라우저에서는 데이터가 기기에 영구 저장되지 않을 수 있습니다. 다운로드한 파일을 Chrome 앱에서 직접 열어주세요 (파일 길게 누르기 → 다른 앱으로 열기 → Chrome).</div>');
    }

    if(showNewForm && newFormStep===1){
      const t = newFormData.inspType||"성능";
      html.push(`
        <div class="new-form">
          <div class="new-form-title">점검 유형 선택</div>
          <div class="insp-type-sel">
            <button class="insp-type-btn${t==="성능"?" active":""}" data-type="성능">
              📊 성능점검
              <span>TTA K-10.0303 성능기준 측정</span>
            </button>
            <button class="insp-type-btn${t==="유지보수"?" active":""}" data-type="유지보수">
              🔧 유지보수관리점검
              <span>외관·기능·안전 유지보수 점검</span>
            </button>
          </div>
          <div class="new-form-title" style="margin-top:14px;"><span class="step-badge">1/2</span>기본 정보 입력</div>
          <div class="field-label">현장명 *</div>
          <input class="text-input" id="f-site" placeholder="예: 분당서울대병원" value="${escapeHtml(newFormData.site||"")}">
          <div class="field-label">점검일자</div>
          <input class="text-input" id="f-date" type="date" value="${newFormData.date||todayStr()}">
          <div class="field-label">건물명 (사진 정보판에 표시됩니다)</div>
          <input class="text-input" id="f-building" placeholder="예: kt광화문빌딩" value="${escapeHtml(newFormData.building||"")}">
          <div class="field-label">점검자</div>
          <input class="text-input" id="f-inspector" placeholder="이름" value="${escapeHtml(newFormData.inspector||lastInspector||"")}">
          <div class="form-row-btns">
            <button class="mini-form-btns_single outline-btn" id="cancel-new" style="flex:1;">취소</button>
            <button class="primary-btn" id="next-step" style="flex:2;">다음 → 설비 선택</button>
          </div>
        </div>
      `);
    } else if(showNewForm && newFormStep===2){
      const allNames = tplByType(newFormData.inspType||"성능").map(c=>c.name);
      const sel = newFormData.selectedEquip || new Set(allNames);
      const selCount = sel.size;
      const gridItems = allNames.map((name,i)=>{
        const ck = sel.has(name) ? "checked" : "";
        return `<div class="equip-item${ck?' checked':''}" data-equip="${escapeHtml(name)}">
          <input type="checkbox" id="eq${i}" ${ck}>
          <label for="eq${i}">${escapeHtml(name)}</label>
        </div>`;
      }).join("");
      html.push(`
        <div class="new-form">
          <div class="new-form-title"><span class="step-badge">2/2</span>점검 대상 설비 선택</div>
          <div class="step-count" id="sel-count">${selCount}개 선택됨</div>
          <div class="equip-select-all">
            <button id="eq-all">전체 선택</button>
            <button id="eq-none">전체 해제</button>
          </div>
          <div class="equip-grid" id="equip-grid">${gridItems}</div>
          <div class="form-row-btns" style="margin-top:14px;">
            <button class="mini-form-btns_single outline-btn" id="back-step" style="flex:1;">← 이전</button>
            <button class="primary-btn" id="start-new" style="flex:2;">점검 시작</button>
          </div>
        </div>
      `);
    } else {
      html.push('<button class="primary-btn" id="open-new">+ 새 점검 시작</button>');
    }

    if(indexList.length===0 && !showNewForm){
      html.push('<div class="empty-state">진행 중인 점검이 없습니다.<br>위 버튼을 눌러 새 점검을 시작하세요.</div>');
    } else if(indexList.length>0) {
      html.push('<div class="field-label" style="margin-top:18px;">저장된 점검</div>');
      indexList.forEach(e=>{
        const pct = e.total ? Math.round(e.done/e.total*100) : 0;
        const delConfirming = deleteConfirmId === e.id;
        html.push(`
          <div class="insp-card" data-id="${e.id}">
            <div class="insp-card-top">
              <div>
                <div class="insp-name">${escapeHtml(e.siteName)}</div>
                <div class="insp-meta">${escapeHtml(e.date||"")}${e.inspector ? " · "+escapeHtml(e.inspector) : ""}
                  <span class="insp-type-badge" style="background:${e.inspType==="유지보수"?"#1a8754":"#155eef"};color:#fff;margin-left:6px;">${e.inspType==="유지보수"?"🔧 유지보수":"📊 성능"}</span>
                </div>
              </div>
              <button class="del-btn ${delConfirming?'confirm':''}" data-del="${e.id}">${delConfirming?'삭제 확인':'삭제'}</button>
            </div>
            <div class="insp-bar-track"><div class="insp-bar-fill" style="width:${pct}%"></div></div>
            <div class="insp-bottom">
              <span class="insp-pct">${e.done}/${e.total} 항목 완료</span>
              <span class="insp-pct">${pct}%</span>
            </div>
          </div>
        `);
      });
    }
    html.push('</div>');
    app.innerHTML = html.join("");

    // 점검 유형 선택 버튼
    document.querySelectorAll(".insp-type-btn").forEach(btn=>{
      btn.onclick = ()=>{
        newFormData.inspType = btn.dataset.type;
        document.querySelectorAll(".insp-type-btn").forEach(b=> b.classList.toggle("active", b===btn));
      };
    });

    // Firebase 설정 버튼
    const fbBtn = document.getElementById("fb-setup-btn");
    if(fbBtn) fbBtn.onclick = openFirebaseSettings;

    const openBtn = document.getElementById("open-new");
    if(openBtn) openBtn.onclick = ()=>{ showNewForm=true; newFormStep=1; newFormData={}; renderList(); };
    const joinBtn = document.getElementById("join-btn");
    if(joinBtn) joinBtn.onclick = openJoinSheet;
    const cancelBtn = document.getElementById("cancel-new");
    if(cancelBtn) cancelBtn.onclick = ()=>{ showNewForm=false; newFormStep=1; newFormData={}; renderList(); };

    // Step 1 → Step 2
    const nextBtn = document.getElementById("next-step");
    if(nextBtn) nextBtn.onclick = ()=>{
      const site = document.getElementById("f-site").value.trim();
      if(!site){ document.getElementById("f-site").focus(); return; }
      newFormData.site = site;
      newFormData.date = document.getElementById("f-date").value || todayStr();
      newFormData.building = document.getElementById("f-building").value.trim();
      newFormData.inspector = document.getElementById("f-inspector").value.trim();
      // Default: all selected
      if(!newFormData.selectedEquip) newFormData.selectedEquip = new Set(tpl().map(c=>c.name));
      newFormStep = 2;
      renderList();
    };

    // Step 2 → back
    const backBtn = document.getElementById("back-step");
    if(backBtn) backBtn.onclick = ()=>{ newFormStep=1; renderList(); };

    // Step 2: equipment grid toggle
    const grid = document.getElementById("equip-grid");
    if(grid){
      grid.querySelectorAll(".equip-item").forEach(el=>{
        el.addEventListener("click",(ev)=>{
          if(ev.target.tagName==="INPUT") return; // handled by checkbox
          const cb = el.querySelector("input");
          cb.checked = !cb.checked;
          updateEquipSelection(el, cb.checked);
        });
        el.querySelector("input").addEventListener("change",(ev)=>{
          updateEquipSelection(el, ev.target.checked);
        });
      });
      document.getElementById("eq-all").onclick = ()=>{
        grid.querySelectorAll(".equip-item").forEach(el=>{
          el.querySelector("input").checked = true;
          updateEquipSelection(el, true);
        });
      };
      document.getElementById("eq-none").onclick = ()=>{
        grid.querySelectorAll(".equip-item").forEach(el=>{
          el.querySelector("input").checked = false;
          updateEquipSelection(el, false);
        });
      };
    }

    function updateEquipSelection(el, checked){
      const name = el.dataset.equip;
      if(!newFormData.selectedEquip) newFormData.selectedEquip = new Set();
      if(checked){ el.classList.add("checked"); newFormData.selectedEquip.add(name); }
      else { el.classList.remove("checked"); newFormData.selectedEquip.delete(name); }
      const cnt = document.getElementById("sel-count");
      if(cnt) cnt.textContent = newFormData.selectedEquip.size+"개 선택됨";
    }

    const startBtn = document.getElementById("start-new");
    if(startBtn) startBtn.onclick = onCreateInspection;

    app.querySelectorAll(".insp-card").forEach(card=>{
      card.addEventListener("click", (ev)=>{
        if(ev.target.closest(".del-btn")) return;
        openInspection(card.dataset.id);
      });
    });
    app.querySelectorAll("[data-del]").forEach(btn=>{
      btn.addEventListener("click",(ev)=>{
        ev.stopPropagation();
        const id = btn.dataset.del;
        if(deleteConfirmId === id){
          deleteInspection(id);
        } else {
          deleteConfirmId = id;
          renderList();
          setTimeout(()=>{ if(deleteConfirmId===id){ deleteConfirmId=null; renderList(); } }, 3000);
        }
      });
    });
  }

  async function onCreateInspection(){
    const site = newFormData.site || "";
    if(!site){ return; }
    const date = newFormData.date || todayStr();
    const building = newFormData.building || "";
    const inspector = newFormData.inspector || "";
    if(inspector) await sSet("last-inspector", inspector);

    const selected = newFormData.selectedEquip || new Set(tpl().map(c=>c.name));
    if(selected.size === 0){
      showToast("설비를 하나 이상 선택해주세요.");
      return;
    }

    const insp = {
      id: uid(),
      siteName: site,
      buildingName: building,
      lastDetailLocation: "",
      date: date,
      inspector: inspector,
      inspType: newFormData.inspType || "성능",
      createdAt: Date.now(),
      categories: tplByType(newFormData.inspType||"성능")
        .filter(c => selected.has(c.name))
        .map(c=>({
          id: c.id, name: c.name,
          locations: [{
            id: uid(), name: "", photos: [],
            items: c.items.map(it=>({
              id: uid(), name: it.name, std: it.std, hasValue: it.hasValue, unit: it.unit||"",
              result: "", value: "", note: "", photos: []
            }))
          }]
        }))
    };
    await sSet("inspection:"+insp.id, JSON.stringify(insp));
    updateIndexEntry(insp);
    await saveIndex();
    showNewForm = false;
    newFormStep = 1;
    newFormData = {};
    openInspection(insp.id);
  }

  async function deleteInspection(id){
    const photoKeys = await sList("photo:"+id+":", false);
    for(const k of photoKeys){ await sDelete(k, false); }
    await sDelete("inspection:"+id, false);
    indexList = indexList.filter(e=>e.id!==id);
    await saveIndex();
    deleteConfirmId = null;
    renderList();
  }

  /* ============ Detail view ============ */
  let openCategoryIds = new Set();
  let addingItemFor = null;
  let addingCategory = false;
  let addingLocationFor = null;
  let renamingLocId = null;
  let noteOpenItems = new Set();
  let detailMode = "check"; // "check" | "photo"
  const activeLocIds = {}; // catId → locId (which tab is active)

  function migrateInspection(insp){
    insp.categories.forEach(cat=>{
      if(!cat.locations){
        cat.locations = [{ id: uid(), name: "", items: cat.items || [], photos: [] }];
        delete cat.items;
      }
      // Migrate old cat-level photos to first location
      cat.locations.forEach((loc, idx)=>{
        if(!loc.photos){
          loc.photos = (idx===0 && cat.photos) ? cat.photos : [];
        }
      });
      delete cat.photos;
    });
    if(typeof insp.buildingName === "undefined") insp.buildingName = "";
    if(typeof insp.lastDetailLocation === "undefined") insp.lastDetailLocation = "";
    if(!insp.inspType) insp.inspType = "성능";
    if(!insp.siteStructure) insp.siteStructure = { buildings: [] };
    return insp;
  }

  async function openInspection(id){
    const raw = await sGet("inspection:"+id, false);
    if(!raw) return;
    current = migrateInspection(JSON.parse(raw));
    openCategoryIds = new Set();
    addingItemFor = null; addingCategory = false; addingLocationFor = null; renamingLocId = null; noteOpenItems = new Set();
    deleteConfirmId = null;
    detailMode = "check";
    renderDetail();
  }

  /* ============================================================
     🏢 현장 건물 구조 관리
     - 건물 등록 (건물명, 층수, 지하층, 실 구성)
     - 층별 현황 floor map 시각화
     - 실별 점검 상태 추적
  ============================================================ */
  const ROOM_TYPES = ['방재실','통신실','전기실','TPS실','MDF실','EPS실','UPS실','감시반','기계실','서버실'];
  const ROOM_COLORS = {
    '방재실':'#D7263D','통신실':'#155EEF','전기실':'#E67E00',
    'TPS실':'#1A8754','MDF실':'#7B2D8B','EPS실':'#0A6E6E',
    'UPS실':'#C06000','감시반':'#444','기계실':'#666','서버실':'#0A5080'
  };

  function openSiteStructureModal(){
    if(!current) return;
    if(!current.siteStructure) current.siteStructure = {buildings:[]};
    renderSiteStructureSheet();
  }

  function renderSiteStructureSheet(){
    const existing = document.getElementById('site-struct-overlay');
    if(existing) existing.remove();

    const ov = document.createElement('div');
    ov.id = 'site-struct-overlay';
    ov.className = 'overlay';
    ov.style.cssText = 'overflow-y:auto;align-items:flex-start;padding:0;';

    const blds = current.siteStructure.buildings;
    const totalRooms = blds.reduce((s,b)=>s+b.rooms.length,0);
    const doneRooms  = blds.reduce((s,b)=>s+b.rooms.filter(r=>r.status==='완료').length,0);
    const progRooms  = blds.reduce((s,b)=>s+b.rooms.filter(r=>r.status==='진행중').length,0);

    // 층별 floor-map 빌더
    function buildFloorMap(bld){
      // 이 건물에 있는 실 유형 종류 수집
      const types = [...new Set(bld.rooms.map(r=>r.type))];
      if(!types.length) return '<div style="padding:10px 14px;font-size:12px;color:var(--muted);">등록된 실이 없습니다</div>';

      // 층 목록 (지하 포함, 내림차순)
      const allFloors = [];
      for(let f=bld.floors; f>=1; f--) allFloors.push(f);
      for(let b=1; b<=bld.basement; b++) allFloors.push(-b);

      let html = '<div class="floor-map"><table><tr><th>층</th>';
      types.forEach(t=> html+=`<th style="color:${ROOM_COLORS[t]||'#333'};">${t}</th>`);
      html += '</tr>';

      allFloors.forEach(f=>{
        const floorLabel = f>0?`${f}층`:`B${Math.abs(f)}층`;
        html += `<tr><td class="floor-label">${floorLabel}</td>`;
        types.forEach(t=>{
          const room = bld.rooms.find(r=>r.floor===f && r.type===t);
          if(!room){
            html += `<td><span class="rc-none">─</span></td>`;
          } else {
            const cls = room.status==='완료'?'rc-done':room.status==='진행중'?'rc-inprog':'rc-wait';
            const icon = room.status==='완료'?'✅':room.status==='진행중'?'🔄':'⏳';
            html += `<td><span class="room-cell ${cls}" onclick="cycleRoomStatus('${bld.id}','${room.id}')" title="${floorLabel} ${t}">${icon}</span></td>`;
          }
        });
        html += '</tr>';
      });
      html += '</table></div>';
      return html;
    }

    let bldHtml = '';
    if(!blds.length){
      bldHtml = `<div style="text-align:center;padding:30px;color:var(--muted);font-size:13px;">
        📭 등록된 건물이 없습니다<br>아래 버튼으로 건물을 추가해주세요
      </div>`;
    } else {
      blds.forEach(bld=>{
        const done  = bld.rooms.filter(r=>r.status==='완료').length;
        const total = bld.rooms.length;
        const pct   = total?Math.round(done/total*100):0;
        bldHtml += `
        <div class="struct-bld-card">
          <div class="struct-bld-header">
            <span class="struct-bld-name">🏢 ${escapeHtml(bld.name)}</span>
            <span class="struct-bld-meta">지상 ${bld.floors}층${bld.basement?` / 지하 ${bld.basement}층`:''}  총 ${total}개소</span>
            <button onclick="deleteBuilding_s('${bld.id}')" style="background:rgba(255,255,255,.15);border:none;color:#fff;border-radius:6px;padding:3px 8px;font-size:11px;cursor:pointer;">삭제</button>
          </div>
          <div style="padding:8px 14px;display:flex;align-items:center;gap:8px;background:#f9fafb;border-bottom:1px solid var(--border);">
            <div style="flex:1;background:#eee;border-radius:6px;height:7px;overflow:hidden;">
              <div style="width:${pct}%;height:100%;background:${pct===100?'var(--good)':'var(--accent)'};border-radius:6px;transition:width .3s;"></div>
            </div>
            <span style="font-size:12px;font-weight:800;color:${pct===100?'var(--good)':'var(--accent)'};">${pct}%</span>
            <span style="font-size:11px;color:var(--muted);">${done}/${total}개소 완료</span>
          </div>
          ${buildFloorMap(bld)}
          <div class="struct-legend">
            <span class="legend-item"><span class="legend-dot" style="background:var(--good-weak);border:1px solid var(--good);"></span>완료</span>
            <span class="legend-item"><span class="legend-dot" style="background:#fff8ee;border:1px solid var(--warn);"></span>진행중</span>
            <span class="legend-item"><span class="legend-dot" style="background:#f0f2f6;"></span>미점검</span>
            <span class="legend-item"><span style="color:#ddd;font-size:12px;">─</span> 해당없음</span>
            <span style="margin-left:auto;font-size:11px;color:var(--muted);">셀 터치 시 상태 변경</span>
          </div>
        </div>`;
      });
    }

    ov.innerHTML = `
      <div style="background:#1A2540;color:#fff;padding:14px;position:sticky;top:0;z-index:10;display:flex;align-items:center;gap:10px;">
        <button onclick="document.getElementById('site-struct-overlay').remove()" style="background:rgba(255,255,255,.15);border:none;color:#fff;border-radius:8px;padding:6px 12px;font-size:13px;font-weight:700;cursor:pointer;">← 닫기</button>
        <div>
          <div style="font-size:15px;font-weight:800;">🏢 현장 건물 구조</div>
          <div style="font-size:11.5px;opacity:.7;">${current.siteName} · 건물 ${blds.length}개 · 총 ${totalRooms}개소</div>
        </div>
      </div>

      <!-- 전체 요약 -->
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:12px;">
        <div style="background:#fff;border-radius:10px;padding:12px;text-align:center;box-shadow:0 1px 4px rgba(0,0,0,.06);">
          <div style="font-size:22px;font-weight:900;color:var(--good);">${doneRooms}</div>
          <div style="font-size:11px;color:var(--muted);">점검 완료</div>
        </div>
        <div style="background:#fff;border-radius:10px;padding:12px;text-align:center;box-shadow:0 1px 4px rgba(0,0,0,.06);">
          <div style="font-size:22px;font-weight:900;color:var(--warn);">${progRooms}</div>
          <div style="font-size:11px;color:var(--muted);">진행중</div>
        </div>
        <div style="background:#fff;border-radius:10px;padding:12px;text-align:center;box-shadow:0 1px 4px rgba(0,0,0,.06);">
          <div style="font-size:22px;font-weight:900;color:var(--accent);">${totalRooms-doneRooms-progRooms}</div>
          <div style="font-size:11px;color:var(--muted);">미점검</div>
        </div>
      </div>

      <!-- 건물 목록 -->
      <div style="padding:0 12px 12px;">${bldHtml}</div>

      <!-- 건물 추가 버튼 -->
      <div style="padding:0 12px 30px;">
        <button onclick="openAddBuildingSheet()" style="width:100%;background:var(--accent);color:#fff;border:none;border-radius:12px;padding:14px;font-size:15px;font-weight:700;cursor:pointer;">+ 건물 추가</button>
      </div>
    `;

    document.body.appendChild(ov);
  }

  // 실 상태 순환 변경 (미점검→진행중→완료→미점검)
  function cycleRoomStatus(bldId, roomId){
    const bld = current.siteStructure.buildings.find(b=>b.id===bldId);
    if(!bld) return;
    const room = bld.rooms.find(r=>r.id===roomId);
    if(!room) return;
    const cycle = ['미점검','진행중','완료'];
    const cur = cycle.indexOf(room.status||'미점검');
    room.status = cycle[(cur+1)%cycle.length];
    scheduleSave();
    renderSiteStructureSheet();
  }

  // 건물 삭제
  function deleteBuilding_s(bldId){
    current.siteStructure.buildings = current.siteStructure.buildings.filter(b=>b.id!==bldId);
    scheduleSave();
    renderSiteStructureSheet();
    showToast('건물이 삭제됐습니다');
  }

  // 건물 추가 시트
  function openAddBuildingSheet(){
    const addOv = document.createElement('div');
    addOv.id = 'add-bld-sheet';
    addOv.className = 'overlay center';
    addOv.innerHTML = `
      <div class="sheet" style="max-height:88vh;overflow-y:auto;">
        <div class="sheet-title">🏢 건물 추가</div>

        <div class="field-label">건물명 *</div>

        <input class="text-input" id="bld-floors" type="number" value="10" min="1" max="60">

          ${ROOM_TYPES.map(t=>`<button onclick="addAllFloors('${t}')" style="background:var(--bg);border:1.5px solid var(--border);border-radius:8px;padding:5px 10px;font-size:12px;font-weight:600;cursor:pointer;color:${ROOM_COLORS[t]||'var(--ink)'};">${t} 전층</button>`).join('')}

      </div>
    `;
    document.body.appendChild(addOv);

    // 층 목록 업데이트
    updateFloorOptions();
    document.getElementById('bld-floors').addEventListener('input', updateFloorOptions);
    document.getElementById('bld-basement').addEventListener('input', updateFloorOptions);

    window._newBldRooms = [];
    renderRoomEntryList();
  }

  function updateFloorOptions(){
    const floors = +document.getElementById('bld-floors').value || 10;
    const basement = +document.getElementById('bld-basement').value || 0;
    const sel = document.getElementById('room-floor-sel');
    if(!sel) return;
    let opts = '<option value="">층 선택</option>';
    for(let f=floors; f>=1; f--) opts += `<option value="${f}">${f}층</option>`;
    for(let b=1; b<=basement; b++) opts += `<option value="-${b}">B${b}층</option>`;
    sel.innerHTML = opts;
  }

  function addRoomEntry(){
    const f = document.getElementById('room-floor-sel').value;
    const t = document.getElementById('room-type-sel').value;
    if(!f||!t){ showToast('층과 실 종류를 선택해주세요'); return; }
    if(window._newBldRooms.find(r=>r.floor===+f&&r.type===t)){ showToast('이미 추가됐습니다'); return; }
    window._newBldRooms.push({id:uid(), floor:+f, type:t, status:'미점검'});
    window._newBldRooms.sort((a,b)=>b.floor-a.floor||a.type.localeCompare(b.type));
    renderRoomEntryList();
  }

  function addAllFloors(type){
    const floors = +document.getElementById('bld-floors').value || 10;
    const basement = +document.getElementById('bld-basement').value || 0;
    let added = 0;
    for(let f=1; f<=floors; f++){
      if(!window._newBldRooms.find(r=>r.floor===f&&r.type===type)){
        window._newBldRooms.push({id:uid(), floor:f, type, status:'미점검'});
        added++;
      }
    }
    for(let b=1; b<=basement; b++){
      if(!window._newBldRooms.find(r=>r.floor===-b&&r.type===type)){
        window._newBldRooms.push({id:uid(), floor:-b, type, status:'미점검'});
        added++;
      }
    }
    window._newBldRooms.sort((a,b)=>b.floor-a.floor||a.type.localeCompare(b.type));
    renderRoomEntryList();
    showToast(`${type} ${added}개층 추가됐습니다`);
  }

  function removeRoomEntry(id){
    window._newBldRooms = window._newBldRooms.filter(r=>r.id!==id);
    renderRoomEntryList();
  }

  function renderRoomEntryList(){
    const el = document.getElementById('room-entry-list');
    if(!el) return;
    if(!window._newBldRooms.length){
      el.innerHTML = '<div style="text-align:center;color:var(--muted);font-size:12px;padding:8px;">아직 추가된 실이 없습니다</div>';
      return;
    }
    el.innerHTML = window._newBldRooms.map(r=>`
      <div style="display:flex;align-items:center;gap:6px;padding:4px 6px;background:#fff;border-radius:7px;margin-bottom:4px;">
        <span style="font-size:12px;font-weight:700;color:var(--muted);min-width:36px;">${r.floor>0?r.floor+'층':'B'+Math.abs(r.floor)+'층'}</span>
        <span style="font-size:12px;font-weight:700;color:${ROOM_COLORS[r.type]||'var(--ink)'};">${r.type}</span>
        <button onclick="removeRoomEntry('${r.id}')" style="margin-left:auto;background:none;border:none;color:var(--bad);font-size:14px;cursor:pointer;">×</button>
      </div>`).join('');
  }

  function saveBuildingEntry(){
    const name = (document.getElementById('bld-name').value||'').trim();
    if(!name){ showToast('건물명을 입력해주세요'); return; }
    const floors = +document.getElementById('bld-floors').value || 1;
    const basement = +document.getElementById('bld-basement').value || 0;
    current.siteStructure.buildings.push({
      id: uid(), name, floors, basement,
      rooms: [...(window._newBldRooms||[])]
    });
    scheduleSave();
    document.getElementById('add-bld-sheet').remove();
    renderSiteStructureSheet();
    showToast(`${name} 건물이 추가됐습니다 (${(window._newBldRooms||[]).length}개소)`);
    window._newBldRooms = [];
  }

      <div class="topbar">

              <div class="site-line">${escapeHtml(current.date||"")}${current.inspector?" · "+escapeHtml(current.inspector):""}
                <span style="margin-left:6px;background:${current.inspType==="유지보수"?"#1a8754":"#155eef"};color:#fff;font-size:10px;font-weight:700;padding:1px 7px;border-radius:10px;">${current.inspType==="유지보수"?"🔧 유지보수":"📊 성능"}</span>
              </div>

          <span class="sync-badge" id="fb-sync-badge" style="margin-left:auto;" onclick="openSyncSheet()"></span>

        <div class="info-banner">점검 완료 후 각 설비 하단의 📷 버튼으로 설비 사진을 촬영하세요.</div>

      <div style="display:flex;gap:6px;">
        <button class="outline-btn" id="struct-btn" style="font-size:12px;padding:8px 9px;">🏢 구조</button>
        <button class="outline-btn" id="sync-btn" style="font-size:12px;padding:8px 9px;background:${fbSyncActive?'#1a8754':'none'};border-color:${fbSyncActive?'#1a8754':'rgba(0,0,0,.15)'};color:${fbSyncActive?'#fff':'inherit'};">🔥 실시간</button>
        <button class="outline-btn" id="share-btn" style="font-size:12px;padding:8px 9px;">📤 공유</button>
        <button class="outline-btn" id="export-btn" style="font-size:12px;padding:8px 9px;">내보내기</button>
      </div>

    app.appendChild(bottom);
    document.getElementById("export-btn").onclick = openExportSheet;
    document.getElementById("share-btn").onclick = openShareSheet;
    document.getElementById("sync-btn").onclick = openSyncSheet;

  function buildCategoryEl(cat){
    const wrap = document.createElement("div");
    wrap.className = "cat" + (openCategoryIds.has(cat.id) ? " open" : "");
    const cp = categoryProgress(cat);
    const badgeClass = cp.total===0 ? "" : (cp.done===0 ? "" : (cp.done===cp.total ? "done" : "partial"));
    const photoCount = cat.locations.reduce((s,l)=> s+(l.photos||[]).length, 0);

    // 현재 활성 위치 탭의 항목만 기준으로 전체 양호 여부 확인
    const activeLoc4Bulk = cat.locations.find(l=>l.id===activeLocIds[cat.id]) || cat.locations[0];
    const bulkItems = activeLoc4Bulk ? activeLoc4Bulk.items : [];
    const allGood = bulkItems.length > 0 && bulkItems.every(it=> it.result === "양호");
    const activeLocLabel = activeLoc4Bulk?.name ? ` [${activeLoc4Bulk.name}]` : "";

    const head = document.createElement("div");
    head.className = "cat-head";
    head.innerHTML = `
      <div class="cat-head-left">
        <div class="cat-name">${escapeHtml(cat.name)}</div>
      </div>
      <div style="display:flex;align-items:center;gap:6px;">
        ${photoCount>0?`<span style="font-size:11px;color:var(--good);font-weight:700;">📷${photoCount}</span>`:""}
        <button class="bulk-good-btn ${allGood?'active':''}" data-catid="${cat.id}" title="현재 위치 전체 양호 설정/해제">
          ${allGood ? '✅ 해제' : '전체 양호'}
        </button>
        <span class="cat-badge ${badgeClass}">${cp.done}/${cp.total}</span>
        <span class="cat-chev">▾</span>
      </div>
    `;

    // 전체 양호 버튼 클릭 — 현재 활성 위치 탭만 적용
    const bulkBtn = head.querySelector(".bulk-good-btn");
    bulkBtn.onclick = (ev)=>{
      ev.stopPropagation();
      const curLoc = cat.locations.find(l=>l.id===activeLocIds[cat.id]) || cat.locations[0];
      if(!curLoc) return;
      const willSet = !allGood;
      curLoc.items.forEach(it=>{ it.result = willSet ? "양호" : ""; });
      scheduleSave();
      bulkBtn.textContent = willSet ? "✅ 해제" : "전체 양호";
      bulkBtn.classList.toggle("active", willSet);
      refreshBadges();
      if(openCategoryIds.has(cat.id)){
        const body = wrap.querySelector(".cat-body");
        if(body) buildCategoryBody(cat, body);
      }
    };

    head.onclick = (ev)=>{
      if(ev.target.closest(".bulk-good-btn")) return;
      if(openCategoryIds.has(cat.id)) openCategoryIds.delete(cat.id);
      else openCategoryIds.add(cat.id);
      wrap.classList.toggle("open");
    };
    wrap.appendChild(head);

    const body = document.createElement("div");
    body.className = "cat-body";
    buildCategoryBody(cat, body);
    wrap.appendChild(body);

    return wrap;
  }

  function buildCategoryBody(cat, body){
    body.innerHTML = "";

    // Determine active location
    if(!activeLocIds[cat.id] || !cat.locations.find(l=>l.id===activeLocIds[cat.id])){
      activeLocIds[cat.id] = cat.locations[0]?.id;
    }
    const activeLoc = cat.locations.find(l=>l.id===activeLocIds[cat.id]) || cat.locations[0];

    // ── Location tab bar (always shown; single loc shows just one tab) ──
    const tabBar = document.createElement("div");
    tabBar.className = "loc-tabbar";

    cat.locations.forEach(loc=>{
      const tab = document.createElement("button");
      tab.className = "loc-tab" + (loc===activeLoc ? " active" : "");
      tab.textContent = loc.name || "위치 입력";
      tab.onclick = ()=>{
        activeLocIds[cat.id] = loc.id;
        rerenderCategoryBody(cat);
      };
      tabBar.appendChild(tab);
    });

    // + 위치 추가 버튼
    const addTabBtn = document.createElement("button");
    addTabBtn.className = "loc-tab-add";
    addTabBtn.title = "위치 추가";
    addTabBtn.textContent = "+";
    addTabBtn.onclick = ()=>{ addingLocationFor = cat.id; rerenderCategoryBody(cat); };
    tabBar.appendChild(addTabBtn);
    body.appendChild(tabBar);

    // ── Inline location name editor (shown when name is empty OR editing) ──
    if(!activeLoc.name || renamingLocId === activeLoc.id){
      const nameEdit = document.createElement("div");
      nameEdit.className = "loc-name-edit";
      const inp = document.createElement("input");
      inp.className = "text-input";
      inp.placeholder = "위치명 입력 (예: TPS실, MDF실, 1층 로비)";
      inp.value = activeLoc.name || "";
      const confirmBtn = document.createElement("button");
      confirmBtn.textContent = "확인";
      const doConfirm = ()=>{
        const v = inp.value.trim();
        if(v){ activeLoc.name = v; renamingLocId = null; scheduleSave(); rerenderCategoryBody(cat); }
        else inp.focus();
      };
      confirmBtn.onclick = doConfirm;
      inp.addEventListener("keydown", e=>{ if(e.key==="Enter") doConfirm(); });
      nameEdit.appendChild(inp);
      nameEdit.appendChild(confirmBtn);

      // 수정/삭제 버튼 (이름 있을 때만)
      if(activeLoc.name){
        const delBtn = document.createElement("button");
        delBtn.style.cssText = "background:var(--bad-weak);color:var(--bad);border:none;border-radius:7px;padding:7px 10px;font-size:12px;font-weight:700;";
        const confirming = deleteConfirmId === ("loc:"+activeLoc.id);
        delBtn.textContent = confirming ? "삭제확인" : "삭제";
        delBtn.onclick = async ()=>{
          if(confirming){
            if(cat.locations.length <= 1){ showToast("마지막 위치는 삭제할 수 없습니다."); return; }
            const keys=[]; activeLoc.items.forEach(it=> it.photos.forEach(k=>keys.push(k)));
            for(const k of keys) await sDelete(k);
            cat.locations = cat.locations.filter(l=>l!==activeLoc);
            activeLocIds[cat.id] = cat.locations[0]?.id;
            deleteConfirmId=null; scheduleSave(); rerenderCategoryBody(cat);
          } else {
            deleteConfirmId="loc:"+activeLoc.id; rerenderCategoryBody(cat);
            setTimeout(()=>{ if(deleteConfirmId==="loc:"+activeLoc.id){deleteConfirmId=null;rerenderCategoryBody(cat);} },3000);
          }
        };
        nameEdit.appendChild(delBtn);
      }
      body.appendChild(nameEdit);
      setTimeout(()=>{ if(!activeLoc.name) inp.focus(); }, 50);
    } else {
      // Name is set — show small edit/delete bar
      const actions = document.createElement("div");
      actions.style.cssText = "display:flex;align-items:center;gap:8px;padding:5px 14px 0;";
      const editBtn = document.createElement("button");
      editBtn.className = "note-toggle";
      editBtn.textContent = "위치명 수정";
      editBtn.onclick = ()=>{ renamingLocId = activeLoc.id; rerenderCategoryBody(cat); };
      actions.appendChild(editBtn);
      if(cat.locations.length > 1){
        const delBtn = document.createElement("button");
        delBtn.style.cssText = "font-size:12px;color:var(--bad);background:none;border:none;font-weight:600;cursor:pointer;padding:4px;";
        const confirming = deleteConfirmId===("loc:"+activeLoc.id);
        delBtn.textContent = confirming ? "삭제 확인" : "이 위치 삭제";
        delBtn.onclick = async ()=>{
          if(confirming){
            const keys=[]; activeLoc.items.forEach(it=> it.photos.forEach(k=>keys.push(k)));
            for(const k of keys) await sDelete(k);
            cat.locations = cat.locations.filter(l=>l!==activeLoc);
            activeLocIds[cat.id] = cat.locations[0]?.id;
            deleteConfirmId=null; scheduleSave(); rerenderCategoryBody(cat);
          } else {
            deleteConfirmId="loc:"+activeLoc.id; rerenderCategoryBody(cat);
            setTimeout(()=>{ if(deleteConfirmId==="loc:"+activeLoc.id){deleteConfirmId=null;rerenderCategoryBody(cat);} },3000);
          }
        };
        actions.appendChild(delBtn);
      }
      body.appendChild(actions);
    }

    // ── Add location inline form ──
    if(addingLocationFor === cat.id){
      const addForm = document.createElement("div");
      addForm.className = "add-item-form";
      addForm.style.borderTop = "1px solid var(--border)";
      addForm.innerHTML = `
        <input class="text-input" id="nl-name" placeholder="새 위치명 * (예: MDF실, EPS실, 방재실)">
        <div class="mini-form-btns">
          <button id="nl-cancel">취소</button>
          <button class="go" id="nl-add">추가</button>
        </div>
      `;
      setTimeout(()=>{
        const inp2 = addForm.querySelector("#nl-name");
        inp2.focus();
        addForm.querySelector("#nl-cancel").onclick = ()=>{ addingLocationFor=null; rerenderCategoryBody(cat); };
        addForm.querySelector("#nl-add").onclick = ()=>{
          const name = inp2.value.trim();
          if(!name){ inp2.focus(); return; }
          if(cat.locations.length===1 && !cat.locations[0].name) cat.locations[0].name = "기본위치";
          const baseItems = cat.locations[0]?.items || [];
          const newLoc = {
            id: uid(), name, photos: [],
            items: baseItems.map(it=>({
              id:uid(), name:it.name, std:it.std, hasValue:it.hasValue, unit:it.unit||"",
              result:"", value:"", note:"", photos:[]
            }))
          };
          cat.locations.push(newLoc);
          activeLocIds[cat.id] = newLoc.id;
          addingLocationFor=null; scheduleSave(); rerenderCategoryBody(cat);
        };
      },0);
      body.appendChild(addForm);
    }

    // ── Tab bar: show photo count per location ──
    cat.locations.forEach((loc, idx)=>{
      const tab = tabBar.children[idx];
      if(!tab) return;
      const pCnt = (loc.photos||[]).length;
      if(pCnt > 0){
        tab.textContent = (loc.name||"위치 입력") + " 📷"+pCnt;
      }
    });

    // ── Items for active location ──
    activeLoc.items.forEach(it=> body.appendChild(buildItemEl(cat, activeLoc, it)));
    body.appendChild(buildAddItemEl(cat, activeLoc));

    // ── 위치별 메모 (1개) ──
    const memoSec = document.createElement("div");
    memoSec.style.cssText = "padding:10px 14px 12px;border-top:1px solid var(--border);";
    const memoLocKey = cat.id + ":" + activeLoc.id;
    if(!activeLoc.memo) activeLoc.memo = "";
    const memoBtn = document.createElement("button");
    memoBtn.className = "note-toggle";
    memoBtn.textContent = activeLoc.memo ? "📝 메모 보기/수정" : "+ 메모 추가";
    memoSec.appendChild(memoBtn);
    const memoArea = document.createElement("textarea");
    memoArea.className = "note-area";
    memoArea.placeholder = "이 위치 특이사항 (불량 내용, 조치사항 등)";
    memoArea.value = activeLoc.memo;
    memoArea.style.cssText = `display:${activeLoc.memo || noteOpenItems.has(memoLocKey) ? "block":"none"};margin-top:6px;`;
    memoArea.addEventListener("input", ()=>{ activeLoc.memo = memoArea.value; memoBtn.textContent = activeLoc.memo ? "📝 메모 보기/수정" : "+ 메모 추가"; scheduleSave(); });
    memoBtn.onclick = ()=>{
      const show = memoArea.style.display === "none";
      memoArea.style.display = show ? "block" : "none";
      if(show){ noteOpenItems.add(memoLocKey); memoArea.focus(); }
      else noteOpenItems.delete(memoLocKey);
    };
    memoSec.appendChild(memoArea);
    body.appendChild(memoSec);

    // ── Location-level photo section (only for active location) ──
    const photoSec = document.createElement("div");
    photoSec.className = "cat-photo-sec";
    photoSec.id = "catphoto-"+cat.id;
    const secLabel = document.createElement("div");
    secLabel.className = "cat-photo-label";
    secLabel.textContent = "📷 설비 사진 — "+(activeLoc.name||"현재 위치");
    photoSec.appendChild(secLabel);
    const pstrip = document.createElement("div");
    pstrip.className = "photo-strip";
    pstrip.id = "catps-"+cat.id;
    photoSec.appendChild(pstrip);
    body.appendChild(photoSec);
    renderCatPhotoStrip(cat, activeLoc, pstrip);

    // ── 설비 삭제 버튼 ──
    const delWrap = document.createElement("div");
    delWrap.className = "cat-del-row";

    function renderDelRow(confirming){
      if(confirming){
        delWrap.innerHTML = `
          <span style="font-size:12px;color:var(--bad);font-weight:600;flex:1;">정말 이 설비를 삭제할까요?</span>
          <button class="cat-del-confirm-btn">삭제 확인</button>
          <button class="cat-del-cancel-btn">취소</button>`;
        delWrap.querySelector(".cat-del-confirm-btn").onclick = async ()=>{
          for(const loc of cat.locations){
            for(const key of (loc.photos||[])){ await sDelete(key); }
          }
          current.categories = current.categories.filter(c=>c.id!==cat.id);
          openCategoryIds.delete(cat.id);
          deleteConfirmId = null;
          scheduleSave();
          refreshBadges();
          // DOM에서 해당 설비 카드 제거
          const catWrap = delWrap.closest(".cat");
          if(catWrap) catWrap.remove();
          showToast(`'${cat.name}' 설비가 삭제됐습니다.`);
        };
        delWrap.querySelector(".cat-del-cancel-btn").onclick = ()=>{
          deleteConfirmId = null;
          renderDelRow(false);
        };
      } else {
        delWrap.innerHTML = `<button class="cat-del-btn">🗑 이 설비 삭제</button>`;
        delWrap.querySelector(".cat-del-btn").onclick = ()=>{
          deleteConfirmId = "cat:"+cat.id;
          renderDelRow(true);
          setTimeout(()=>{
            if(deleteConfirmId==="cat:"+cat.id){
              deleteConfirmId = null;
              renderDelRow(false);
            }
          }, 4000);
        };
      }
    }
    renderDelRow(deleteConfirmId === "cat:"+cat.id);
    body.appendChild(delWrap);
  }

        ? { siteName: current.siteName, buildingName: building, location, equipment: cat.name, status: statusVal, note }

      if(useCamera){ photoFileInput.setAttribute("capture","environment"); photoFileInput.removeAttribute("multiple"); photoFileInput.click(); }
      else {
        // 갤러리 다중선택: 매번 새 input 생성 (브라우저 호환성 최대화)
        const galleryInput = document.createElement("input");
        galleryInput.type = "file";
        galleryInput.accept = "image/*";
        galleryInput.multiple = true;
        galleryInput.style.display = "none";

        galleryInput.addEventListener("change", async (gev)=>{
          const files = Array.from(gev.target.files || []);
          galleryInput.remove();
          if(!files.length) return;
          // pendingPhotoTarget에 이미 저장된 cat/loc/pstrip/board 사용
          const addBtns = pstrip.querySelectorAll(".photo-add");
          addBtns.forEach(b=>{ b.innerHTML="처리중…"; b.disabled=true; });
          let savedCount=0, failCount=0;
          for(const file of files){
            let dataUrl=null;
            try{ dataUrl = await composePhotoWithBoard(file, board, 900); }
            catch(e){
              try{ dataUrl = await compressImage(file, 900, 0.6); }
              catch(e2){ try{ dataUrl = await readAsDataURL(file); }catch(e3){} }

            autoSaveToGallery(dataUrl, cat.name);
            const key = "photo:"+current.id+":cat:"+cat.id+":loc:"+loc.id+":"+uid();

            if(!loc.photos) loc.photos=[];
            loc.photos.push(key);
            savedCount++;
          }
          scheduleSave();
          renderCatPhotoStrip(cat, loc, pstrip);
          refreshCatPhotoCount();
          rerenderTabBar(cat);
          if(savedCount>0) showToast(files.length>1?`사진 ${savedCount}장 추가됐습니다.`:"사진이 추가됐습니다.");
          else showToast("사진 처리에 실패했습니다.");
        });
        // 동기적으로 click — iOS/Android 모두 정상 동작
        galleryInput.click();
      }
    };
  }

      savedCount++;

    renderCatPhotoStrip(cat, loc, pstrip);
    refreshCatPhotoCount();
    rerenderTabBar(cat);

    if(savedCount > 0 && failCount === 0){
      showToast(files.length > 1 ? `사진 ${savedCount}장이 추가됐습니다.` : "사진이 추가됐습니다.");

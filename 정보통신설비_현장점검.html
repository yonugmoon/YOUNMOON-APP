  function isMobileDevice(){
    return /Android|iPhone|iPad|iPod|Mobile|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
  }

  // ── 갤러리 자동 저장 (모바일 전용) ──
  function autoSaveToGallery(dataUrl, catName){
    if(!isMobileDevice()) return; // PC/노트북에서는 저장 팝업 방지
    try{
      const now = new Date();
      const pad = n => String(n).padStart(2,'0');
      const fname = `점검사진_${now.getFullYear()}${pad(now.getMonth()+1)}${pad(now.getDate())}_${pad(now.getHours())}${pad(now.getMinutes())}${pad(now.getSeconds())}_${(catName||'설비').slice(0,8)}.jpg`;
      const byteStr = atob(dataUrl.split(',')[1]);
      const arr = new Uint8Array(byteStr.length);
      for(let i=0;i<byteStr.length;i++) arr[i]=byteStr.charCodeAt(i);
      const blob = new Blob([arr], {type:'image/jpeg'});
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = fname; a.style.display = 'none';
      document.body.appendChild(a); a.click();
      setTimeout(()=>{ URL.revokeObjectURL(url); a.remove(); }, 3000);
    }catch(e){ console.warn('갤러리 자동저장 실패:', e.message); }
  }

  function readAsDataURL(file){
    return new Promise((resolve,reject)=>{
      const reader = new FileReader();
      reader.onload = ()=> resolve(reader.result);
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  }

  function composePhotoWithBoard(file, board, maxW){
    return new Promise((resolve, reject)=>{
      if(!board){ reject(new Error("no board")); return; }
      const reader = new FileReader();
      reader.onload = ()=>{
        const img = new Image();
        img.onload = ()=>{
          try{
            let w = img.width, h = img.height;
            if(w > maxW){ h = Math.round(h * (maxW/w)); w = maxW; }

            const rows = [
              ["국소명",      board.siteName     || ""],
              ["건물명",      board.buildingName  || ""],
              ["상세위치",    board.location      || ""],
              ["설비명",      board.equipment     || ""],
              ["적합/부적합", board.status        || ""],
              ["비고",        board.note          || ""],
            ];

            // Board occupies ~38% of image width (reference photo ratio)
            const boardW  = Math.round(w * 0.38);
            // Row height: ~3.5% of image height (compact, like the reference)
            const rowH    = Math.max(18, Math.round(h * 0.035));
            const boardH  = rowH * rows.length;
            const labelW  = Math.round(boardW * 0.38);
            const baseFont = Math.max(9, Math.round(rowH * 0.48));
            const lineW   = Math.max(1, Math.round(w * 0.0018));

            // Canvas = same size as photo
            const canvas = document.createElement("canvas");
            canvas.width  = w;
            canvas.height = h;
            const ctx = canvas.getContext("2d");
            ctx.drawImage(img, 0, 0, w, h);

            // Board origin: bottom-left
            const bx = 0;
            const by = h - boardH;

            // White background (solid, like reference)
            ctx.fillStyle = "rgba(255,255,255,0.95)";
            ctx.fillRect(bx, by, boardW, boardH);

            // Table lines
            ctx.lineWidth    = lineW;
            ctx.strokeStyle  = "#111";
            ctx.textBaseline = "middle";

            rows.forEach((r, i)=>{
              const ry = by + i * rowH;
              ctx.strokeRect(bx,          ry, labelW,          rowH);
              ctx.strokeRect(bx + labelW, ry, boardW - labelW, rowH);
              fitText(ctx, r[0], bx + 4,          ry + rowH/2, labelW - 8,          baseFont, true);
              fitText(ctx, r[1], bx + labelW + 4, ry + rowH/2, boardW - labelW - 8, baseFont, false);
            });

            resolve(canvas.toDataURL("image/jpeg", 0.82));
          }catch(e){ reject(e); }
        };
        img.onerror = reject;
        img.src = reader.result;
      };
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  }

  function fitText(ctx, text, x, yMid, maxWidth, baseFontPx, bold){
    if(!text) return;
    let fontPx = baseFontPx;
    function setFont(){ ctx.font = (bold ? "bold " : "") + fontPx + "px sans-serif"; }
    setFont();
    while(fontPx > 10 && ctx.measureText(text).width > maxWidth){
      fontPx -= 1;
      setFont();
    }
    ctx.save();
    ctx.beginPath();
    ctx.rect(x - 2, yMid - fontPx, maxWidth + 4, fontPx * 2);
    ctx.clip();
    ctx.fillStyle = "#000";
    ctx.fillText(text, x, yMid);
    ctx.restore();
  }

  function compressImage(file, maxW, quality){
    return new Promise((resolve, reject)=>{
      const reader = new FileReader();
      reader.onload = ()=>{
        const img = new Image();
        img.onload = ()=>{
          let w = img.width, h = img.height;
          if(w > maxW){ h = Math.round(h * (maxW/w)); w = maxW; }
          const canvas = document.createElement("canvas");
          canvas.width = w; canvas.height = h;
          canvas.getContext("2d").drawImage(img,0,0,w,h);
          resolve(canvas.toDataURL("image/jpeg", quality));
        };
        img.onerror = reject;
        img.src = reader.result;
      };
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  }

  function openPhotoView(dataUrl){

  function refreshBadges(){
    // update category badges + header progress without full rebuild
    document.querySelectorAll(".cat").forEach((wrap, idx)=>{
      const cat = current.categories[idx];
      if(!cat) return;
      const cp = categoryProgress(cat);
      const badge = wrap.querySelector(".cat-badge");
      badge.textContent = cp.done+"/"+cp.total;
      badge.classList.remove("done","partial");
      if(cp.total>0 && cp.done>0) badge.classList.add(cp.done===cp.total ? "done":"partial");
    });
    const p = computeProgress(current);
    const ptext = document.querySelector(".progress-text");
    if(ptext) ptext.textContent = p.done+"/"+p.total+" 완료 · "+p.pct+"%";
    const filledBars = Math.min(5, Math.ceil(p.pct/20));
    document.querySelectorAll(".signal i").forEach((bar,i)=>{
      bar.classList.toggle("on", i < filledBars);
    });
    // Update tab bar check count
    const tabCheck = document.querySelector("#tab-check .tab-count");
    if(tabCheck) tabCheck.textContent = p.done+"/"+p.total;
  }

  function buildAddItemEl(cat, loc){
    const wrap = document.createElement("div");
    const formKey = cat.id+"|"+loc.id;
    const isOpen = addingItemFor === formKey;
    if(!isOpen){
      const btn = document.createElement("button");
      btn.className = "dashed-btn";
      btn.style.margin = "10px 14px 13px";
      btn.style.width = "calc(100% - 28px)";
      btn.textContent = "+ 점검 항목 추가";
      btn.onclick = ()=>{ addingItemFor = formKey; rerenderCategoryBody(cat); };
      wrap.appendChild(btn);
      return wrap;
    }
    wrap.className = "add-item-form";
    wrap.innerHTML = `
      <input class="text-input" id="ni-name" placeholder="항목명 *">
      <input class="text-input" id="ni-std" placeholder="점검기준 (선택)">
      <label class="checkbox-row"><input type="checkbox" id="ni-hasval"> 측정값 입력 필요</label>
      <input class="text-input" id="ni-unit" placeholder="단위 (예: Ω, V, ℃)" style="display:none;">
      <div class="mini-form-btns">
        <button id="ni-cancel">취소</button>
        <button class="go" id="ni-add">추가</button>
      </div>
    `;
    setTimeout(()=>{
      const hv = wrap.querySelector("#ni-hasval");
      const unitInput = wrap.querySelector("#ni-unit");
      hv.onchange = ()=>{ unitInput.style.display = hv.checked ? "block":"none"; };
      wrap.querySelector("#ni-cancel").onclick = ()=>{ addingItemFor=null; rerenderCategoryBody(cat); };
      wrap.querySelector("#ni-add").onclick = ()=>{
        const name = wrap.querySelector("#ni-name").value.trim();
        if(!name) return;
        loc.items.push({
          id: uid(), name, std: wrap.querySelector("#ni-std").value.trim(),
          hasValue: hv.checked, unit: unitInput.value.trim(),
          result:"", value:"", note:"", photos:[]
        });
        addingItemFor = null;
        scheduleSave();
        rerenderCategoryBody(cat);
      };
    },0);
    return wrap;
  }

  function rerenderCategoryBody(cat){
    const cats = Array.from(document.querySelectorAll(".cat"));
    const idx = current.categories.findIndex(c=>c.id===cat.id);
    const wrap = cats[idx];
    if(!wrap) return;
    openCategoryIds.add(cat.id);
    wrap.classList.add("open");
    const body = wrap.querySelector(".cat-body");
    buildCategoryBody(cat, body);
    refreshBadges();
  }

  function buildAddCategoryEl(){
    const wrap = document.createElement("div");
    if(!addingCategory){
      const btn = document.createElement("button");
      btn.className = "dashed-btn";
      btn.textContent = "+ 설비 추가";
      btn.onclick = ()=>{ addingCategory = true; rerenderCatListTail(); };
      wrap.appendChild(btn);
      return wrap;
    }
    // Show unselected equipment from master list first, then custom
    const existingNames = new Set(current.categories.map(c=>c.name));
    const available = tpl().map(c=>c.name).filter(n=>!existingNames.has(n));
    const optionsHtml = available.map(n=>`<option value="${escapeHtml(n)}">${escapeHtml(n)}</option>`).join("");

    wrap.className = "add-cat-form";
    wrap.style.borderRadius = "12px";
    wrap.style.border = "1px solid var(--border)";
    wrap.innerHTML = `
      ${available.length>0 ? `
        <div class="field-label" style="margin-top:0;">설비 목록에서 선택</div>
        <select class="text-input" id="nc-select" style="background:#fff;">
          <option value="">— 선택 —</option>
          ${optionsHtml}
        </select>
        <div class="field-label">또는 직접 입력</div>` : ""}
      <input class="text-input" id="nc-name" placeholder="설비 카테고리명">
      <div class="mini-form-btns">
        <button id="nc-cancel">취소</button>
        <button class="go" id="nc-add">추가</button>
      </div>
    `;
    setTimeout(()=>{
      const sel = wrap.querySelector("#nc-select");
      const nameInput = wrap.querySelector("#nc-name");
      if(sel){
        sel.onchange = ()=>{
          if(sel.value) nameInput.value = sel.value;
        };
      }
      wrap.querySelector("#nc-cancel").onclick = ()=>{ addingCategory=false; rerenderCatListTail(); };
      wrap.querySelector("#nc-add").onclick = ()=>{
        const name = nameInput.value.trim() || (sel ? sel.value : "");
        if(!name){ if(nameInput) nameInput.focus(); return; }
        // If it's from tpl, copy its items; otherwise start empty
        const tplCat = tpl().find(c=>c.name===name);
        const newCat = {
          id: uid(), name,
          locations: [{
            id: uid(), name: "",
            items: tplCat ? tplCat.items.map(it=>({
              id: uid(), name: it.name, std: it.std, hasValue: it.hasValue, unit: it.unit||"",
              result:"", value:"", note:"", photos:[]
            })) : []
          }]
        };
        current.categories.push(newCat);
        addingCategory = false;
        openCategoryIds.add(newCat.id);
        scheduleSave();
        const catList = document.getElementById("cat-list");
        catList.innerHTML = "";
        current.categories.forEach(c=> catList.appendChild(buildCategoryEl(c)) );
        catList.appendChild(buildAddCategoryEl());
      };
    },0);
    return wrap;
  }

  function rerenderCatListTail(){
    const catList = document.getElementById("cat-list");
    catList.innerHTML = "";
    current.categories.forEach(c=> catList.appendChild(buildCategoryEl(c)) );
    catList.appendChild(buildAddCategoryEl());
  }

  /* ── 워드 보고서 생성 (CDN 없이 JSZip으로 직접 생성) ── */
  async function buildWordReport(onProgress){
    onProgress("사진 불러오는 중…");
    const photoCache = {};
    let loaded = 0, total = 0;
    current.categories.forEach(cat=> cat.locations.forEach(loc=>{ total += (loc.photos||[]).length; }));
    for(const cat of current.categories){
      for(const loc of cat.locations){
        for(const key of (loc.photos||[])){
          const data = await sGet(key);
          if(data) photoCache[key] = data;
          loaded++;
          onProgress(`사진 불러오는 중… (${loaded}/${total})`);
        }
      }
    }

    onProgress("라이브러리 로딩 중…");
    if(!window.JSZip){
      await new Promise((resolve, reject)=>{
        const s = document.createElement("script");
        s.src = "https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js";
        s.onload = resolve;
        s.onerror = ()=> reject(new Error("인터넷 연결을 확인하고 다시 시도해주세요."));
        document.head.appendChild(s);
      });
    }

    onProgress("워드 문서 생성 중…");
    const p = computeProgress(current);
    const bad = [];
    current.categories.forEach(cat=>{
      cat.locations.forEach(loc=>{
        loc.items.forEach(it=>{ if(it.result==="불량") bad.push({cat:cat.name, loc:loc.name||"", item:it.name, note:it.note||""}); });
      });
    });

    // ── XML helpers ──
    const x = s=> String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    const rpr = (o={})=>
      `<w:rPr><w:rFonts w:ascii="Malgun Gothic" w:hAnsi="Malgun Gothic" w:eastAsia="Malgun Gothic" w:cs="Malgun Gothic"/>`+
      (o.bold?"<w:b/><w:bCs/>":"")+
      `<w:sz w:val="${o.sz||20}"/><w:szCs w:val="${o.sz||20}"/>`+
      (o.color?`<w:color w:val="${o.color}"/>`:"")+"</w:rPr>";
    const run  = (t,o={})=>`<w:r>${rpr(o)}<w:t xml:space="preserve">${x(t)}</w:t></w:r>`;
    const para = (inner,o={})=>{
      let ppr="";
      const parts=[];
      if(o.align) parts.push(`<w:jc w:val="${o.align}"/>`);
      if(o.after!==undefined) parts.push(`<w:spacing w:after="${o.after}"/>`);
      else if(o.before!==undefined) parts.push(`<w:spacing w:before="${o.before}" w:after="0"/>`);
      if(o.shade) parts.push(`<w:shd w:val="clear" w:color="auto" w:fill="${o.shade}"/>`);
      if(parts.length) ppr=`<w:pPr>${parts.join("")}</w:pPr>`;
      return `<w:p>${ppr}${inner}</w:p>`;
    };

    const BORD = `<w:tcBorders><w:top w:val="single" w:sz="4" w:space="0" w:color="BBBBBB"/><w:left w:val="single" w:sz="4" w:space="0" w:color="BBBBBB"/><w:bottom w:val="single" w:sz="4" w:space="0" w:color="BBBBBB"/><w:right w:val="single" w:sz="4" w:space="0" w:color="BBBBBB"/></w:tcBorders>`;
    const MAR  = `<w:tcMar><w:top w:w="60" w:type="dxa"/><w:left w:w="100" w:type="dxa"/><w:bottom w:w="60" w:type="dxa"/><w:right w:w="100" w:type="dxa"/></w:tcMar>`;
    const cell = (inner, w, opts={})=>{
      const span = opts.span?`<w:gridSpan w:val="${opts.span}"/>`:"";
      const shade= opts.bg?`<w:shd w:val="clear" w:color="auto" w:fill="${opts.bg}"/>`:"";
      return `<w:tc><w:tcPr><w:tcW w:w="${w}" w:type="dxa"/>${span}${shade}${BORD}${MAR}<w:vAlign w:val="center"/></w:tcPr>${inner}</w:tc>`;
    };
    const row = inner=>`<w:tr>${inner}</w:tr>`;

    // ── Image helper ──
    const mediaFiles={};
    let imgSeq=0;
    const addImg=async(dataUrl, cxEmu, cyEmu)=>{
      if(!dataUrl) return "";
      try{
        const b64=dataUrl.split(",")[1];
        const bin=atob(b64);
        const bytes=new Uint8Array(bin.length);
        for(let i=0;i<bin.length;i++) bytes[i]=bin.charCodeAt(i);
        imgSeq++;
        const fname=`image${imgSeq}.jpg`;
        mediaFiles[fname]=bytes;
        const cx = Math.round(7.2 * 360000);  // 7.2cm 고정
        const cy = Math.round(9.3 * 360000);  // 9.3cm 고정
        const rid=`rImg${imgSeq}`;
        mediaFiles[`__r${imgSeq}`]={rid, fname};
        return `<w:r><w:rPr/><w:drawing>`+
          `<wp:inline xmlns:wp="http://schemas.openxmlformats.org/drawingml/2006/wordprocessingDrawing">`+
          `<wp:extent cx="${cx}" cy="${cy}"/><wp:effectExtent l="0" t="0" r="0" b="0"/>`+
          `<wp:docPr id="${imgSeq}" name="${fname}"/>`+
          `<wp:cNvGraphicFramePr><a:graphicFrameLocks xmlns:a="http://schemas.openxmlformats.org/drawingml/2006/main" noChangeAspect="1"/></wp:cNvGraphicFramePr>`+
          `<a:graphic xmlns:a="http://schemas.openxmlformats.org/drawingml/2006/main">`+
          `<a:graphicData uri="http://schemas.openxmlformats.org/drawingml/2006/picture">`+
          `<pic:pic xmlns:pic="http://schemas.openxmlformats.org/drawingml/2006/picture">`+
          `<pic:nvPicPr><pic:cNvPr id="${imgSeq}" name="${fname}"/><pic:cNvPicPr/></pic:nvPicPr>`+
          `<pic:blipFill><a:blip r:embed="${rid}" xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships"/>`+
          `<a:stretch><a:fillRect/></a:stretch></pic:blipFill>`+
          `<pic:spPr><a:xfrm><a:off x="0" y="0"/><a:ext cx="${cx}" cy="${cy}"/></a:xfrm>`+
          `<a:prstGeom prst="rect"><a:avLst/></a:prstGeom></pic:spPr>`+
          `</pic:pic></a:graphicData></a:graphic></wp:inline></w:drawing></w:r>`;
      }catch(e){ return ""; }
    };

    // 사진 2열 배치 — 메인 테이블 밖 독립 단락으로 배치
    // 이미지 1장: 너비 7.2cm × 높이 9.3cm
    const IMG_CX = Math.round(7.2 * 360000);  // 7.2cm = 2,592,000 EMU
    const IMG_CY = Math.round(9.3 * 360000);  // 9.3cm = 3,348,000 EMU

    const buildPhotoSection = async (photoKeys, cache) => {
      if(!photoKeys || !photoKeys.length) return "";
      const imgXmls = [];
      for(const key of photoKeys){
        const r = await addImg(cache[key], IMG_CX, IMG_CY);
        if(r) imgXmls.push(r);
      }
      if(!imgXmls.length) return "";

      let result = "";
      for(let i=0; i<imgXmls.length; i+=2){
        const hasRight = i+1 < imgXmls.length;
        // 사진 제목 행: "점검사진" 레이블 (좌/우)
        const labelLeft  = `<w:r><w:rPr><w:rFonts w:ascii="Malgun Gothic" w:eastAsia="Malgun Gothic"/><w:sz w:val="18"/><w:b/></w:rPr><w:t xml:space="preserve">점검사진</w:t></w:r>`;
        const labelGap   = `<w:r><w:rPr/><w:t xml:space="preserve">                              </w:t></w:r>`;
        const labelRight = hasRight ? `<w:r><w:rPr><w:rFonts w:ascii="Malgun Gothic" w:eastAsia="Malgun Gothic"/><w:sz w:val="18"/><w:b/></w:rPr><w:t xml:space="preserve">점검사진</w:t></w:r>` : "";
        result += `<w:p><w:pPr><w:jc w:val="left"/><w:spacing w:after="0"/></w:pPr>${labelLeft}${labelGap}${labelRight}</w:p>`;

        // 사진 행: 이미지 2개 나란히, 사이 간격
        const gap = hasRight ? `<w:r><w:rPr/><w:t xml:space="preserve"> </w:t></w:r>` : "";
        result += `<w:p><w:pPr><w:jc w:val="left"/><w:spacing w:after="100"/></w:pPr>`+
          imgXmls[i] + gap + (hasRight ? imgXmls[i+1] : "") +
          `</w:p>`;
      }
      return result;
    };

    // ── 항목 자동 그룹화 (외관/기능/안전) ──
    function autoGroup(items){
      const 외관KW = ['외관 상태','케이블 및 커넥터','고정 및 취부','작동 표시부','주변기기','배터리 보호','배터리 누액','FDF 내','배관·트레이','안테나 수직','렌즈 오염','카메라부','방진/방수','선번장','케이블 명찰','케이블 연결 상태','케이블 정리','케이블 결선','광케이블 곡률','동축케이블','볼트 및 너트','내화 충전재','맨홀 내 시설물','맨홀 뚜껑','배터리 충전'];
      const 안전KW = ['설치 환경 확인','전원 단자 및 연결','이상 발열','접지저항 측정','조명설비 동작','예비전원','항온·항습','가스 발생','맨홀 내 사다리','맨홀·수공','이격거리','잠금 장치','재해','환기 상태','트레이 접지','접지 상태 확인','장비 전원공급','냉각팬'];
      const g = { 외관:[], 기능:[], 안전:[] };
      items.forEach(it=>{
        if(외관KW.some(k=> it.name.includes(k))) g.외관.push(it);
        else if(안전KW.some(k=> it.name.includes(k))) g.안전.push(it);
        else g.기능.push(it);
      });
      return g;
    }

    // ── 결과 기호 변환 ──
    const resSym = r => r==="양호"?"○" : r==="불량"?"X" : r==="해당없음"?"-" : "";

    // ── 테이블 상수 (샘플 양식 기준) ──
    const TW=9639;
    const CG=1220;   // 점검항목(그룹)
    const CN=5640;   // 점검내용
    const CR=1480;   // 점검결과
    const CB=TW-CG-CN-CR; // 비고 (1299)

    // ── 공통 테이블 테두리 ──
    const BORD_STD =
      `<w:tcBorders>`+
      `<w:top w:val="single" w:sz="4" w:space="0" w:color="000000"/>`+
      `<w:bottom w:val="single" w:sz="4" w:space="0" w:color="000000"/>`+
      `<w:right w:val="single" w:sz="4" w:space="0" w:color="000000"/>`+
      `</w:tcBorders>`;
    const BORD_TOP_THICK =
      `<w:tcBorders>`+
      `<w:top w:val="single" w:sz="12" w:space="0" w:color="000000"/>`+
      `<w:bottom w:val="single" w:sz="4" w:space="0" w:color="000000"/>`+
      `<w:right w:val="single" w:sz="4" w:space="0" w:color="000000"/>`+
      `</w:tcBorders>`;
    const MAR_STD = `<w:tcMar><w:top w:w="60" w:type="dxa"/><w:left w:w="99" w:type="dxa"/><w:bottom w:w="60" w:type="dxa"/><w:right w:w="99" w:type="dxa"/></w:tcMar>`;

    const F = "맑은 고딕";
    const rp  = (o={})=>`<w:rPr><w:rFonts w:ascii="${F}" w:hAnsi="${F}" w:eastAsia="${F}" w:cs="${F}"/>`+
      (o.b?`<w:b/><w:bCs/>`:"")+(o.sz?`<w:sz w:val="${o.sz}"/><w:szCs w:val="${o.sz}"/>`:"")+
      (o.color?`<w:color w:val="${o.color}"/>`:"")+`</w:rPr>`;
    const rn  = (t,o={})=>`<w:r>${rp(o)}<w:t xml:space="preserve">${x(t)}</w:t></w:r>`;
    const pp  = (inner,o={})=>`<w:p><w:pPr><w:widowControl/><w:wordWrap/><w:autoSpaceDE/><w:autoSpaceDN/>`+
      `<w:spacing w:after="${o.after!==undefined?o.after:0}"/>`+
      (o.jc?`<w:jc w:val="${o.jc}"/>`:"")+(o.shade?`<w:shd w:val="clear" w:color="auto" w:fill="${o.shade}"/>`:"")+
      `</w:pPr>${inner}</w:p>`;

    // 셀 생성
    const tc = (inner, w, o={})=>{
      const sp  = o.span?`<w:gridSpan w:val="${o.span}"/>`:"";
      const vm  = o.vm?`<w:vAlign w:val="${o.vm}"/>`:`<w:vAlign w:val="center"/>`;
      const shd = o.bg?`<w:shd w:val="clear" w:color="auto" w:fill="${o.bg}"/>`:"";
      const brd = o.thick?BORD_TOP_THICK:BORD_STD;
      return `<w:tc><w:tcPr><w:tcW w:w="${w}" w:type="dxa"/>${sp}${shd}${brd}${MAR_STD}${vm}</w:tcPr>${inner}</w:tc>`;
    };
    const tr  = inner=>`<w:tr><w:trPr><w:trHeight w:val="405"/></w:trPr>${inner}</w:tr>`;
    const tr2 = (h,inner)=>`<w:tr><w:trPr><w:trHeight w:val="${h}"/></w:trPr>${inner}</w:tr>`;

    // 테이블 열기/닫기
    const openTbl=()=>
      `<w:tbl><w:tblPr><w:tblW w:w="${TW}" w:type="dxa"/>`+
      `<w:tblLayout w:type="fixed"/>`+
      `<w:tblCellMar><w:left w:w="99" w:type="dxa"/><w:right w:w="99" w:type="dxa"/></w:tblCellMar>`+
      `</w:tblPr>`+
      `<w:tblGrid><w:gridCol w:w="${CG}"/><w:gridCol w:w="${CN}"/><w:gridCol w:w="${CR}"/><w:gridCol w:w="${CB}"/></w:tblGrid>`;
    const closeTbl=()=>`</w:tbl>`;

    // 그룹 행 (외관/기능/안전) — 첫 항목만 그룹명 표시, 나머지는 빈칸
    function groupRows(groupName, items, measMap){
      if(!items.length) return "";
      let out="";
      items.forEach((it,idx)=>{
        const sym  = resSym(it.result);
        const meas = (it.hasValue && it.value) ? `${it.value}${it.unit||""}` : "";
        const note = it.result==="불량" ? (it.note||"") : meas;
        const symColor = it.result==="양호"?"000000":it.result==="불량"?"CC0000":"000000";
        out += tr(
          // 점검항목(그룹): 첫 행만 그룹명
          tc(pp(idx===0?rn(groupName,{sz:20}):""), CG)+
          // 점검내용
          tc(pp(rn(it.name,{sz:20})), CN)+
          // 점검결과
          tc(pp(rn(sym,{sz:20,b:it.result==="불량",color:symColor}),{jc:"center"}), CR)+
          // 비고
          tc(pp(rn(note,{sz:18,color:it.result==="불량"?"CC0000":"555555"})), CB)
        );
      });
      return out;
    }

    // ── 본문 구성 ──
    let body="";
    let catIdx=0;

    for(const cat of current.categories){
      if(!cat.locations.some(l=>l.items.length>0)) continue;
      catIdx++;

      for(let li=0; li<cat.locations.length; li++){
        const loc = cat.locations[li];
        if(!loc.items.length) continue;
        const locName = loc.name || "";
        const secNo = `${catIdx}-${li+1}`;

        // ── 점검결과 섹션 제목 ──
        body += pp(rn(`${secNo}-1) ${cat.name} 점검결과`, {sz:24, b:true}), {after:60});

        // ── 메인 점검표 테이블 ──
        body += openTbl();

        // 헤더 행1: 점검자 / 설치위치
        body += tr(
          tc(pp(rn("점검자",{sz:20,b:true}),{jc:"center"}), CG, {bg:"D9D9D9",thick:true})+
          tc(pp(rn(current.inspector||"",{sz:20})), CN, {thick:true})+
          tc(pp(rn("설치위치",{sz:20,b:true}),{jc:"center"}), CR, {bg:"D9D9D9",thick:true})+
          tc(pp(rn(locName,{sz:20})), CB, {thick:true})
        );
        // 헤더 행2: 설치업체
        body += tr(
          tc(pp(rn("설치업체",{sz:20,b:true}),{jc:"center"}), CG, {bg:"D9D9D9"})+
          tc(pp(rn("",{sz:20})), CN+CR+CB, {span:3})
        );
        // 컬럼 헤더 행
        body += tr(
          tc(pp(rn("점검항목",{sz:20,b:true}),{jc:"center"}), CG, {bg:"D9D9D9"})+
          tc(pp(rn("점검내용",{sz:20,b:true}),{jc:"center"}), CN, {bg:"D9D9D9"})+
          tc(pp(rn("점검결과",{sz:20,b:true}),{jc:"center"}), CR, {bg:"D9D9D9"})+
          tc(pp(rn("비고",{sz:20,b:true}),{jc:"center"}), CB, {bg:"D9D9D9"})
        );

        // 항목 행 (외관/기능/안전 자동 그룹)
        const grp = autoGroup(loc.items);
        body += groupRows("외관", grp.외관, {});
        body += groupRows("기능", grp.기능, {});
        body += groupRows("안전", grp.안전, {});

        // 작성방법 footer
        body += tr2(560,
          tc(pp(rn("작성방법",{sz:18,b:true}),{jc:"center"}), CG, {bg:"D9D9D9", vm:"top"})+
          tc(
            pp(rn("1. 점검결과에는 [적합 ○, 부적합 X, 해당없음 - ]을 표기하고, 비고에는 부적합 사유를 기록한다.",{sz:17}),{after:0})+
            pp(rn("2. 유지보수·관리 대상 정보통신설비의 특성 및 여건에 맞게 점검내용을 추가·변경할 수 있다.",{sz:17}),{after:0}),
            CN+CR+CB, {span:3, vm:"top"}
          )
        );

        body += closeTbl();

        // ── 점검사진 섹션 제목 ──
        body += pp(rn(""), {after:60});
        body += pp(rn(`${secNo}-2) ${cat.name} 점검사진`,{sz:24,b:true}),{after:60});

        // ── 사진 테이블 ──
        const photos = loc.photos||[];
        const PHOTO_TW = TW;
        const PHOTO_C  = Math.round(PHOTO_TW/2);
        const PHOTO_CX = Math.round(7.2*360000);  // 7.2cm 고정
        const PHOTO_CY = Math.round(9.3*360000);  // 9.3cm 고정

        body +=
          `<w:tbl><w:tblPr><w:tblW w:w="${PHOTO_TW}" w:type="dxa"/><w:tblLayout w:type="fixed"/></w:tblPr>`+
          `<w:tblGrid><w:gridCol w:w="${PHOTO_C}"/><w:gridCol w:w="${PHOTO_TW-PHOTO_C}"/></w:tblGrid>`;

        // 사진 2열 배치
        const maxPairs = Math.max(2, Math.ceil(photos.length/2)); // 최소 2쌍 행
        for(let pi=0; pi<maxPairs*2; pi+=2){
          const leftKey  = photos[pi];
          const rightKey = photos[pi+1];
          const leftImg  = leftKey  ? await addImg(photoCache[leftKey],  PHOTO_CX, PHOTO_CY) : "";
          const rightImg = rightKey ? await addImg(photoCache[rightKey], PHOTO_CX, PHOTO_CY) : "";
          // 레이블 행
          body += tr2(300,
            tc(pp(rn("점검사진",{sz:18,b:true}),{jc:"center"}), PHOTO_C, {bg:"D9D9D9"})+
            tc(pp(rn("점검사진",{sz:18,b:true}),{jc:"center"}), PHOTO_TW-PHOTO_C, {bg:"D9D9D9"})
          );
          // 사진 행
          body += tr2(4800,
            tc(pp(leftImg,  {jc:"center"}), PHOTO_C, {vm:"center"})+
            tc(pp(rightImg, {jc:"center"}), PHOTO_TW-PHOTO_C, {vm:"center"})
          );
        }

        // 특이사항 행
        const memo = loc.memo||"";
        const bad_items = loc.items.filter(it=>it.result==="불량").map(it=>`ㅇ ${it.name}${it.note?" — "+it.note:""}`).join("\n");
        const specialNote = bad_items || (memo ? `ㅇ ${memo}` : `ㅇ ${cat.name} 관리상태 양호`);

        body += tr2(300,
          tc(pp(rn("특  이  사  항",{sz:20,b:true}),{jc:"center"}), PHOTO_TW, {span:2, bg:"D9D9D9"})
        );
        body += tr2(600,
          tc(pp(rn(specialNote,{sz:20})), PHOTO_TW, {span:2, vm:"top"})
        );

        body += `</w:tbl>`;
        body += pp(rn(""),{after:200}); // 섹션 구분 공백
      }
    }

    // 불량 항목 없어도 페이지 마지막에 생성일시 표기
    body += pp(rn(`생성일시: ${new Date().toLocaleString("ko-KR")}  |  점검자: ${current.inspector||""}  |  현장: ${current.siteName}`,{sz:16,color:"AAAAAA"}),{after:0});


    // ── Assemble OOXML package ──
    const imgRels=Object.keys(mediaFiles).filter(k=>k.startsWith("__r")).map(k=>mediaFiles[k]);
    const relXml=`<?xml version="1.0" encoding="UTF-8" standalone="yes"?>\n<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">\n`+
      `  <Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/styles" Target="styles.xml"/>\n`+
      imgRels.map(r=>`  <Relationship Id="${r.rid}" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/image" Target="media/${r.fname}"/>`).join("\n")+
      "\n</Relationships>";

    const docXml=`<?xml version="1.0" encoding="UTF-8" standalone="yes"?>`+
`<w:document xmlns:wpc="http://schemas.microsoft.com/office/word/2010/wordprocessingCanvas" xmlns:cx="http://schemas.microsoft.com/office/drawing/2014/chartex" xmlns:mc="http://schemas.openxmlformats.org/markup-compatibility/2006" xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships" xmlns:m="http://schemas.openxmlformats.org/officeDocument/2006/math" xmlns:v="urn:schemas-microsoft-com:vml" xmlns:wp14="http://schemas.microsoft.com/office/word/2010/wordprocessingDrawing" xmlns:wp="http://schemas.openxmlformats.org/drawingml/2006/wordprocessingDrawing" xmlns:w10="urn:schemas-microsoft-com:office:word" xmlns:w="http://schemas.openxmlformats.org/wordprocessingml/2006/main" xmlns:w14="http://schemas.microsoft.com/office/word/2010/wordml" xmlns:w15="http://schemas.microsoft.com/office/word/2012/wordml" xmlns:w16se="http://schemas.microsoft.com/office/word/2015/wordml/symex" xmlns:wpg="http://schemas.microsoft.com/office/word/2010/wordprocessingGroup" xmlns:wpi="http://schemas.microsoft.com/office/word/2010/wordprocessingInk" xmlns:wne="http://schemas.microsoft.com/office/word/2006/wordml" xmlns:wps="http://schemas.microsoft.com/office/word/2010/wordprocessingShape" mc:Ignorable="w14 w15 w16se wp14">`+
`<w:body>${body}<w:sectPr><w:pgSz w:w="11906" w:h="16838"/><w:pgMar w:top="1030" w:right="858" w:bottom="1030" w:left="858" w:header="709" w:footer="709" w:gutter="0"/></w:sectPr></w:body></w:document>`;

    const stylesXml=`<?xml version="1.0" encoding="UTF-8" standalone="yes"?><w:styles xmlns:w="http://schemas.openxmlformats.org/wordprocessingml/2006/main" xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships"><w:docDefaults><w:rPrDefault><w:rPr><w:rFonts w:ascii="Malgun Gothic" w:eastAsia="Malgun Gothic" w:hAnsi="Malgun Gothic" w:cs="Malgun Gothic"/><w:sz w:val="20"/><w:szCs w:val="20"/><w:lang w:val="ko-KR" w:eastAsia="ko-KR" w:bidi="ar-SA"/></w:rPr></w:rPrDefault></w:docDefaults><w:style w:type="paragraph" w:default="1" w:styleId="Normal"><w:name w:val="Normal"/><w:qFormat/></w:style></w:styles>`;

    const ctXml=`<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Types xmlns="http://schemas.openxmlformats.org/package/2006/content-types"><Default Extension="rels" ContentType="application/vnd.openxmlformats-package.relationships+xml"/><Default Extension="xml" ContentType="application/xml"/><Default Extension="jpg" ContentType="image/jpeg"/><Override PartName="/word/document.xml" ContentType="application/vnd.openxmlformats-officedocument.wordprocessingml.document.main+xml"/><Override PartName="/word/styles.xml" ContentType="application/vnd.openxmlformats-officedocument.wordprocessingml.styles+xml"/></Types>`;

    const appRels=`<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships"><Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/officeDocument" Target="word/document.xml"/></Relationships>`;

    onProgress("파일 압축 중…");
    const zip=new window.JSZip();
    zip.file("[Content_Types].xml", ctXml);
    zip.file("_rels/.rels", appRels);
    zip.file("word/document.xml", docXml);
    zip.file("word/styles.xml", stylesXml);
    zip.file("word/_rels/document.xml.rels", relXml);
    Object.keys(mediaFiles).forEach(k=>{ if(!k.startsWith("__r")) zip.file(`word/media/${k}`, mediaFiles[k]); });

    const blob=await zip.generateAsync({type:"blob",mimeType:"application/vnd.openxmlformats-officedocument.wordprocessingml.document",compression:"DEFLATE",compressionOptions:{level:6}});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");
    a.href=url; a.download=`점검보고서_${current.siteName}_${current.date||todayStr()}.docx`;
    document.body.appendChild(a); a.click();
    setTimeout(()=>{ URL.revokeObjectURL(url); a.remove(); },3000);
    showToast("워드(.docx) 파일이 다운로드됩니다.");
  }
  async function buildHtmlReport(onProgress){

      cat.locations.forEach(loc=>{
        totalPhotos += (loc.photos||[]).length;
        loc.items.forEach(it=> totalPhotos += (it.photos||[]).length);
      });
    });
    let loadedPhotos = 0;

    // Pre-load all photos (location-level)
    const photoCache = {};
    for(const cat of current.categories){
      for(const loc of cat.locations){
        for(const key of (loc.photos||[])){
          const data = await sGet(key);
          if(data) photoCache[key] = data;
          loadedPhotos++;
          onProgress(`사진 불러오는 중… (${loadedPhotos}/${totalPhotos})`);
        }
        for(const it of loc.items){
          for(const key of (it.photos||[])){
            const data = await sGet(key);
            if(data) photoCache[key] = data;
            loadedPhotos++;
            onProgress(`사진 불러오는 중… (${loadedPhotos}/${totalPhotos})`);
          }
        }
      }
    }
    onProgress("보고서 생성 중…");

    const H = (s) => String(s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

    let rows = "";
    let catIdx = 0;
    for(const cat of current.categories){
      const hasItems = cat.locations.some(l=>l.items.length>0);
      if(!hasItems){ catIdx++; continue; }
      catIdx++;

      for(const loc of cat.locations){
        if(loc.items.length===0) continue;
        const locLabel = cat.locations.length>1 ? ` <span class="loc-tag">${H(loc.name||"미지정")}</span>` : "";
        const locPhotos = (loc.photos||[]);
        let locPhotoHtml = "";
        if(locPhotos.length){
          locPhotoHtml = `<div class="photo-row" style="margin-top:6px;">`;

          }
          locPhotoHtml += `</div>`;
        }
        rows += `<tr class="cat-row"><td colspan="3"><span class="cat-num">${catIdx}</span> ${H(cat.name)}${locLabel}${locPhotoHtml}</td></tr>`;
        for(const it of loc.items){
          const rb = it.result==="양호"?"ok": it.result==="불량"?"bad": it.result==="해당없음"?"na":"none";
          const measured = it.hasValue && it.value ? `<div class="mval">${H(it.value)} ${H(it.unit||"")}</div>` : "";
          const noteHtml = it.note ? `<div class="note-text">${H(it.note)}</div>` : "";
          rows += `<tr>
            <td class="item-name-cell">${H(it.name)}${noteHtml}</td>

          </tr>`;
        }
      }
    }

          if(it.result==="불량") bad.push({cat:cat.name, item:it.name, note:it.note||""});
          else if(!it.result) unfinished.push({cat:cat.name, item:it.name});
        });
      });
    });

    const badRowsHtml = bad.length ? bad.map(b=>`<tr><td>${H(b.cat)}</td><td>${H(b.item)}</td><td>${H(b.note)||"—"}</td></tr>`).join("") : `<tr><td colspan="3" style="text-align:center;color:#888;">없음</td></tr>`;

    return `<!DOCTYPE html>

<div class="section-title">설비별 점검결과</div>
<table>
  <thead><tr><th style="width:46%">점검항목</th><th style="width:26%">점검기준</th><th style="width:28%">결과</th></tr></thead>
  <tbody>${rows}</tbody>

${bad.length>0?`
<div class="defect-title">부적합(불량) 항목 요약</div>
<table>
  <thead><tr><th style="width:30%">설비</th><th style="width:35%">항목</th><th style="width:35%">메모</th></tr></thead>

</table>`:""}

<div style="margin-top:30px;font-size:9pt;color:#aaa;text-align:right;">생성일시: ${new Date().toLocaleString("ko-KR")}</div>
</body>
</html>`;
  }
